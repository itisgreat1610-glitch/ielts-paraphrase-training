<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IELTS Paraphrase Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0F172A;--surface:#1E293B;--surface2:#334155;--text:#F1F5F9;--text-dim:#94A3B8;--text-muted:#64748B;--border:#475569;--t1:#3B82F6;--t2:#8B5CF6;--t3:#F59E0B;--t4:#10B981;--t5:#EC4899;--t6:#EF4444;--ng:#6B7280;--q-color:#F97316;--p-color:#3B82F6;--match-color:#10B981;--correct:#10B981;--wrong:#EF4444;--radius:12px;--focus-ring:0 0 0 2px var(--bg),0 0 0 4px var(--t3);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
:focus-visible{outline:none;box-shadow:var(--focus-ring);border-radius:4px;}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);border:0;}

/* TOAST NOTIFICATIONS */
.toast{position:fixed;bottom:1rem;right:1rem;padding:1rem 1.25rem;border-radius:8px;z-index:999;animation:slideInUp 0.3s ease;max-width:320px;font-size:0.9rem;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,0.3);}
@keyframes slideInUp{from{opacity:0;transform:translateY(2rem)}to{opacity:1;transform:translateY(0)}}
@keyframes slideOutDown{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(2rem)}}
.toast-correct{background:rgba(16,185,129,0.95);color:#fff;border:1px solid rgba(16,185,129,0.5);}
.toast-wrong{background:rgba(239,68,68,0.95);color:#fff;border:1px solid rgba(239,68,68,0.5);}
.toast-info{background:rgba(59,130,246,0.95);color:#fff;border:1px solid rgba(59,130,246,0.5);}
.toast.hide{animation:slideOutDown 0.3s ease forwards;}

/* CONFETTI BURST */
.confetti-burst{position:fixed;z-index:998;}
.confetti-burst::before,.confetti-burst::after{content:'';position:absolute;width:8px;height:8px;border-radius:50%;animation:burstFloat 0.6s ease-out forwards;}
.confetti-burst::before{background:#10B981;left:0;top:0;}
.confetti-burst::after{background:#F59E0B;right:0;top:0;}
@keyframes burstFloat{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}}

/* MODAL OVERLAY */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.2s ease;}
.modal-content{background:var(--surface);border-radius:var(--radius);padding:1.5rem;max-height:80vh;overflow-y:auto;max-width:600px;width:90%;border:1px solid var(--border);animation:slideDown 0.3s ease;}
@keyframes slideDown{from{opacity:0;transform:translateY(-2rem)}to{opacity:1;transform:translateY(0)}}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid var(--border);}
.modal-close{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:1.5rem;padding:0;width:32px;height:32px;display:flex;align-items:center;justify-content:center;transition:color 0.2s;}
.modal-close:hover{color:var(--text);}

/* ROUND SUMMARY */
.summary-stats{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;}
.summary-stat{background:var(--surface2);padding:1rem;border-radius:8px;text-align:center;border:1px solid var(--border);}
.summary-stat-big{font-family:'DM Serif Display',serif;font-size:2rem;font-weight:700;color:var(--t3);margin-bottom:0.3rem;}
.summary-stat-label{font-size:0.8rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;}
.mastery-bars{display:flex;flex-direction:column;gap:0.75rem;}
.mastery-bar-item{display:flex;justify-content:space-between;align-items:center;gap:0.75rem;}
.mastery-bar-label{font-size:0.85rem;font-weight:600;min-width:100px;color:var(--text-dim);}
.mastery-bar-track{flex:1;height:8px;background:var(--surface2);border-radius:4px;border:1px solid var(--border);overflow:hidden;}
.mastery-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--t3),var(--t4));transition:width 0.3s ease;}
.mastery-bar-pct{font-size:0.8rem;color:var(--text-muted);font-family:'JetBrains Mono',monospace;min-width:35px;text-align:right;}

/* LEADERBOARD */
.leaderboard-list{display:flex;flex-direction:column;gap:0.5rem;}
.leaderboard-entry{display:flex;align-items:center;gap:0.75rem;padding:0.75rem;background:var(--surface2);border-radius:8px;border:1px solid var(--border);}
.leaderboard-rank{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:0.9rem;color:var(--t3);min-width:30px;}
.leaderboard-name{flex:1;}
.leaderboard-name-primary{font-weight:600;color:var(--text);font-size:0.9rem;}
.leaderboard-name-sub{font-size:0.75rem;color:var(--text-muted);}
.leaderboard-accuracy{text-align:right;font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--p-color);}
.leaderboard-empty{text-align:center;padding:1.5rem;color:var(--text-muted);font-size:0.85rem;}

/* HEADER */
.app-header{background:rgba(15,23,42,0.85);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid rgba(255,255,255,0.06);padding:0.85rem 1.25rem;text-align:center;position:sticky;top:0;z-index:100;}
.app-header-inner{max-width:900px;margin:0 auto;position:relative;display:flex;align-items:center;justify-content:space-between;}
.header-title-group{flex:1;text-align:center;}
.app-title{font-family:'DM Serif Display',serif;font-size:1.35rem;}
.app-subtitle{font-size:0.75rem;color:var(--text-dim);margin-top:0.15rem;}
.header-back{display:inline-flex;align-items:center;gap:0.3rem;padding:0.45rem 0.9rem;border-radius:100px;font-size:0.8rem;font-weight:600;color:var(--text-dim);text-decoration:none;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);transition:all 0.2s;}
.header-back:hover{color:var(--text);background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.1);}
.header-controls{display:flex;gap:0.5rem;align-items:center;}
.header-streak{font-size:0.85rem;font-weight:600;color:var(--t3);display:flex;align-items:center;gap:0.25rem;}
.header-leaderboard-btn{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:1.1rem;padding:0.4rem;transition:color 0.2s;display:inline-flex;align-items:center;justify-content:center;}
.header-leaderboard-btn:hover{color:var(--text);}

/* MASTERY BAR */
.mastery-bar{display:flex;gap:0.3rem;padding:0.5rem 0.6rem;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;align-items:center;justify-content:center;flex-wrap:wrap;}
.mastery-item{font-size:0.62rem;padding:0.25rem 0.5rem;border-radius:6px;border:1px solid var(--border);background:var(--surface2);text-align:center;min-width:60px;}
.mastery-item .mi-name{font-weight:600;margin-bottom:0.1rem;white-space:nowrap;}
.mastery-item .mi-pct{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:0.75rem;}
.mastery-item .mi-count{font-size:0.58rem;color:var(--text-muted);}
.mastery-item.weak{border-color:var(--wrong);background:rgba(239,68,68,0.08);}
.mastery-item.strong{border-color:var(--correct);background:rgba(16,185,129,0.08);}

/* TABS */
.mode-tabs{display:flex;gap:0.3rem;padding:0.5rem 0.6rem;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;}
.mode-tab{font-size:0.72rem;font-weight:600;padding:0.42rem 0.7rem;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;white-space:nowrap;transition:all 0.2s;}
.mode-tab:hover{color:var(--text);border-color:var(--text-muted);}
.mode-tab[aria-selected="true"]{background:var(--t3);color:#000;border-color:var(--t3);}

/* TOOLBAR */
.toolbar{display:flex;gap:0.35rem;padding:0.45rem 0.75rem;flex-wrap:wrap;align-items:center;background:rgba(30,41,59,0.5);border-bottom:1px solid var(--border);}
.toolbar-label{font-size:0.65rem;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-right:0.2rem;}
.tool-btn{font-size:0.65rem;font-weight:600;padding:0.22rem 0.5rem;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;transition:all 0.15s;}
.tool-btn:hover{border-color:var(--text-muted);}
.tool-btn[aria-pressed="true"]{color:#fff;border-color:transparent;}
.tool-btn[data-t="all"][aria-pressed="true"]{background:var(--text-muted);}
.tool-btn[data-t="T1"][aria-pressed="true"]{background:var(--t1);}
.tool-btn[data-t="T2"][aria-pressed="true"]{background:var(--t2);}
.tool-btn[data-t="T3"][aria-pressed="true"]{background:var(--t3);color:#000;}
.tool-btn[data-t="T4"][aria-pressed="true"]{background:var(--t4);}
.tool-btn[data-t="T5"][aria-pressed="true"]{background:var(--t5);}
.tool-btn[data-t="T6"][aria-pressed="true"]{background:var(--t6);}
.tool-btn[data-t="combo"][aria-pressed="true"]{background:linear-gradient(135deg,var(--t2),var(--t5));}
.tool-select{font-family:'DM Sans',sans-serif;font-size:0.68rem;font-weight:600;padding:0.22rem 0.4rem;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;}
.shuffle-toggle{display:flex;align-items:center;gap:0.3rem;font-size:0.65rem;color:var(--text-dim);font-weight:600;cursor:pointer;user-select:none;margin-left:auto;}
.shuffle-toggle input{accent-color:var(--t3);width:14px;height:14px;cursor:pointer;}

/* MAIN */
.main{padding:1rem;max-width:720px;margin:0 auto;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;animation:fadeIn 0.3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;}
.card-id{font-family:'JetBrains Mono',monospace;font-size:0.68rem;color:var(--text-muted);}
.card-progress{font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:var(--text-dim);}
.phrase-block{padding:0.85rem 1rem;border-radius:8px;margin-bottom:0.75rem;font-size:0.92rem;line-height:1.55;border-left:4px solid;}
.phrase-q{background:rgba(249,115,22,0.08);border-color:var(--q-color);}
.phrase-p{background:rgba(59,130,246,0.08);border-color:var(--p-color);}
.phrase-ng{background:rgba(107,114,128,0.08);border-color:var(--ng);}
.phrase-label{font-family:'JetBrains Mono',monospace;font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.35rem;}
.phrase-label-q{color:var(--q-color);}
.phrase-label-p{color:var(--p-color);}
.phrase-label-ng{color:var(--ng);}
.answer-key{margin-top:0.5rem;padding:0.6rem 0.85rem;background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);border-radius:8px;font-size:0.85rem;}
.answer-key .ak-label{font-family:'JetBrains Mono',monospace;font-size:0.65rem;font-weight:700;color:var(--match-color);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.2rem;}
.answer-key .ak-value{font-weight:700;color:var(--text);font-size:1rem;}
.trick-explain{margin-top:0.5rem;padding:0.65rem 0.85rem;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;font-size:0.82rem;line-height:1.6;}
.trick-explain .te-name{font-weight:700;margin-bottom:0.35rem;display:flex;align-items:center;gap:0.4rem;}
.trick-explain .te-dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0;}
.trick-explain .te-mapping{color:var(--text-dim);margin-top:0.2rem;}
.trick-explain .te-q{color:var(--q-color);font-weight:600;}
.trick-explain .te-p{color:var(--p-color);font-weight:600;}
.trick-explain .te-arrow{color:var(--match-color);font-weight:700;margin:0 0.3rem;}
.trick-explain .te-why{color:var(--text-muted);font-size:0.78rem;margin-top:0.25rem;font-style:italic;}
.trick-badge{display:inline-block;font-size:0.68rem;font-weight:700;padding:0.18rem 0.55rem;border-radius:4px;color:#fff;margin:0.1rem;white-space:nowrap;}
.btn-row{display:flex;gap:0.5rem;margin-top:1rem;flex-wrap:wrap;}
.btn{font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:600;padding:0.65rem 1.25rem;border-radius:8px;border:none;cursor:pointer;transition:all 0.15s;flex:1;min-width:100px;}
.btn:disabled{opacity:0.4;cursor:not-allowed;pointer-events:none;}
.btn-primary{background:var(--t3);color:#000;}
.btn-primary:hover{filter:brightness(1.1);}
.btn-correct{background:var(--correct);color:#fff;}
.btn-wrong{background:var(--wrong);color:#fff;}
.btn-ng-action{background:var(--ng);color:#fff;}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text-dim);}
.btn-outline:hover{border-color:var(--text-muted);color:var(--text);}
.btn-trick{font-size:0.78rem;font-weight:700;padding:0.55rem 0.5rem;border-radius:8px;border:2px solid var(--border);background:transparent;color:var(--text);cursor:pointer;transition:all 0.15s;text-align:center;line-height:1.3;}
.btn-trick:hover{transform:translateY(-1px);}
.btn-trick:disabled{opacity:0.4;transform:none;cursor:not-allowed;}
.trick-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.4rem;}
.trick-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.35rem;}
.btn-trick .bt-name{font-size:0.68rem;font-weight:500;color:var(--text-dim);display:block;margin-top:0.1rem;}
.feedback{padding:0.85rem 1rem;border-radius:8px;margin-top:0.75rem;font-size:0.85rem;line-height:1.5;animation:fadeIn 0.25s ease;}
.feedback-correct{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);color:#6EE7B7;}
.feedback-wrong{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#FCA5A5;}
.prompt-text{text-align:center;margin:1rem 0;font-size:0.92rem;font-weight:600;color:var(--text-dim);}
.timer-bar{background:var(--surface2);border-radius:4px;height:6px;margin-bottom:0.75rem;overflow:hidden;}
.timer-fill{height:100%;background:var(--t3);transition:width 0.1s linear;border-radius:4px;}
.timer-fill.danger{background:var(--wrong);}
.score-card{text-align:center;padding:2rem;}
.score-big{font-family:'DM Serif Display',serif;font-size:3rem;}
.score-label{font-size:0.85rem;color:var(--text-dim);margin-top:0.25rem;}
.score-breakdown{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.75rem;margin-top:1.5rem;}
.score-stat{background:var(--surface2);padding:0.75rem;border-radius:8px;}
.score-stat-val{font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:700;}
.score-stat-label{font-size:0.7rem;color:var(--text-muted);margin-top:0.15rem;}

/* LOGIN */
.login-screen{text-align:center;padding:2.5rem 1rem;max-width:420px;margin:0 auto;}
.login-screen h2{font-family:'DM Serif Display',serif;font-size:1.6rem;margin-bottom:0.5rem;}
.login-screen p{color:var(--text-dim);font-size:0.85rem;line-height:1.5;margin-bottom:1.5rem;}
.login-field{margin-bottom:0.75rem;text-align:left;}
.login-field label{display:block;font-size:0.75rem;font-weight:600;color:var(--text-dim);margin-bottom:0.3rem;}
.login-field input,.login-field select{width:100%;font-family:'DM Sans',sans-serif;font-size:0.9rem;padding:0.6rem 0.75rem;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);}
.login-field input:focus,.login-field select:focus{border-color:var(--t3);outline:none;}
.login-row{display:flex;gap:0.5rem;}
.login-row .login-field{flex:1;}
.login-hint{font-size:0.7rem;color:var(--text-muted);margin-top:0.5rem;}
.login-welcome{font-size:0.88rem;color:var(--text-dim);margin-bottom:1rem;padding:0.75rem;background:var(--surface2);border-radius:8px;}
.login-welcome strong{color:var(--text);}
.recent-logins{margin-bottom:1.5rem;}
.recent-logins-label{font-size:0.75rem;color:var(--text-muted);font-weight:600;margin-bottom:0.5rem;text-transform:uppercase;letter-spacing:0.05em;}
.recent-logins-buttons{display:flex;flex-direction:column;gap:0.4rem;}
.recent-login-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:0.65rem 1rem;border-radius:8px;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.2s;text-align:left;}
.recent-login-btn:hover{border-color:var(--t3);transform:translateX(4px);}
.recent-login-stats{font-size:0.7rem;color:var(--text-muted);margin-top:0.2rem;}

/* WELCOME */
.welcome{text-align:center;padding:1.5rem 1rem;}
.welcome h2{font-family:'DM Serif Display',serif;font-size:1.4rem;margin-bottom:0.5rem;}
.welcome p{color:var(--text-dim);font-size:0.85rem;line-height:1.6;margin-bottom:1.25rem;max-width:500px;margin-left:auto;margin-right:auto;}
.mode-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:0.75rem;cursor:pointer;transition:all 0.2s;text-align:left;}
.mode-card:hover{border-color:var(--t3);transform:translateY(-2px);}
.mode-card h3{font-size:0.95rem;margin-bottom:0.25rem;}
.mode-card p{font-size:0.78rem;color:var(--text-muted);margin:0;}
.weak-suggest{margin-bottom:1.25rem;padding:0.75rem 1rem;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:8px;font-size:0.82rem;text-align:left;}
.weak-suggest strong{color:var(--wrong);}

@media(max-width:500px){.mode-tabs{gap:0.2rem;padding:0.4rem;}.mode-tab{font-size:0.62rem;padding:0.3rem 0.5rem;}.main{padding:0.75rem;}.card{padding:1rem;}.phrase-block{font-size:0.85rem;padding:0.7rem 0.85rem;}.btn{font-size:0.8rem;padding:0.55rem 0.75rem;}.trick-grid{grid-template-columns:1fr;}.mastery-item{min-width:50px;font-size:0.58rem;}.mastery-item .mi-pct{font-size:0.68rem;}.app-header-inner{flex-direction:column;gap:0.5rem;}.header-controls{margin-top:0.3rem;}.summary-stats{grid-template-columns:1fr;}.modal-content{width:95%;}}
</style>
</head>
<body>
<header class="app-header"><div class="app-header-inner"><a class="header-back" href="../">&larr; Home</a><div class="header-title-group"><h1 class="app-title">IELTS Paraphrase Trainer</h1><p class="app-subtitle">1,210 Real Cambridge Pairs &middot; 6 Tricks &middot; Books 8&ndash;16</p></div><div class="header-controls"><span class="header-streak" id="streakDisplay" style="display:none;"></span><button class="header-leaderboard-btn" id="leaderboardBtn" style="display:none;" aria-label="View leaderboard">🏆</button></div></div></header>
<div class="mastery-bar" id="masteryBar" style="display:none;" role="status" aria-live="polite" aria-label="Trick mastery"></div>
<span id="statTotal" style="display:none;">0</span>
<nav class="mode-tabs" role="tablist"><button class="mode-tab" role="tab" aria-selected="true" data-action="mode" data-mode="welcome">Home</button><button class="mode-tab" role="tab" aria-selected="false" data-action="mode" data-mode="recognise">&#9989; Recognise</button><button class="mode-tab" role="tab" aria-selected="false" data-action="mode" data-mode="classify">&#127991;&#65039; Classify</button><button class="mode-tab" role="tab" aria-selected="false" data-action="mode" data-mode="notgiven">&#10067; NOT GIVEN</button><button class="mode-tab" role="tab" aria-selected="false" data-action="mode" data-mode="speed">&#9889; Speed</button></nav>

/* ============================================================
   TRICK DEFINITIONS
   ============================================================ */
const TRICKS = {
  T1: { name:"Word Family", color:"var(--t1)", dark:false,
    desc:"The question and passage use the same root word in a different grammatical form (e.g. noun becomes verb, adjective becomes adverb)." },
  T2: { name:"Synonym Swap", color:"var(--t2)", dark:false,
    desc:"The question and passage use completely different words that mean the same thing." },
  T3: { name:"Phrase Swap", color:"var(--t3)", dark:true,
    desc:"A whole phrase in the question is replaced with a different phrase that carries the same meaning." },
  T4: { name:"General / Specific", color:"var(--t4)", dark:false,
    desc:"The question uses a general category word, while the passage gives a specific example (or vice versa)." },
  T5: { name:"Structure Flip", color:"var(--t5)", dark:false,
    desc:"The same fact is expressed using completely different grammar (e.g. verb phrase becomes noun, active becomes passive)." },
  T6: { name:"Opposite + Negative", color:"var(--t6)", dark:false,
    desc:"The meaning is flipped to its opposite and a negative word is added, so the overall meaning stays the same." }
};
const TRICK_KEYS = ['T1','T2','T3','T4','T5','T6'];

/* ============================================================
   UTILITIES
   ============================================================ */
function escapeHTML(str) {
  if (typeof str !== 'string') return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function buildBadge(trickKey) {
  const trick = TRICKS[trickKey];
  if (!trick) return '<span class="trick-badge" style="background:var(--text-muted);">' + trickKey + '</span>';
  return '<span class="trick-badge" style="background:' + trick.color + ';' + (trick.dark ? 'color:#000;' : '') + '">' + escapeHTML(trick.name) + '</span>';
}

function parseTrickDetail(detailStr) {
  const trickMatch = detailStr.match(/\(([^)]+)\)\s*$/);
  const trickKey = trickMatch ? trickMatch[1] : '';
  const mapping = detailStr.replace(/\([^)]*\)\s*$/, '').trim();
  const parts = mapping.split(/\s*(?:\u2192|->)\s*/);
  return { questionWord: parts[0] || '', passageWord: parts[1] || '', trickKey };
}

function buildTrickExplanation(detailStr) {
  const info = parseTrickDetail(detailStr);
  const trick = TRICKS[info.trickKey];
  if (!trick) {
    return '<div class="trick-explain"><div class="te-name"><span class="te-dot" style="background:var(--text-muted);"></span> Direct Match</div><div class="te-mapping"><span class="te-q">\u201c' + escapeHTML(info.questionWord) + '\u201d</span><span class="te-arrow">=</span><span class="te-p">\u201c' + escapeHTML(info.passageWord) + '\u201d</span></div><div class="te-why">These words are identical \u2014 no paraphrase trick used here.</div></div>';
  }
  return '<div class="trick-explain"><div class="te-name"><span class="te-dot" style="background:' + trick.color + ';"></span> ' + escapeHTML(trick.name) + '</div><div class="te-mapping"><span class="te-q">\u201c' + escapeHTML(info.questionWord) + '\u201d</span><span class="te-arrow">\u2192</span><span class="te-p">\u201c' + escapeHTML(info.passageWord) + '\u201d</span></div><div class="te-why">' + escapeHTML(trick.desc) + '</div></div>';
}

function buildPhraseBlock(type, label, text) {
  const blockClass = type === 'q' ? 'phrase-q' : type === 'p' ? 'phrase-p' : 'phrase-ng';
  const labelClass = type === 'q' ? 'phrase-label-q' : type === 'p' ? 'phrase-label-p' : 'phrase-label-ng';
  return '<div class="phrase-block ' + blockClass + '"><div class="phrase-label ' + labelClass + '">' + escapeHTML(label) + '</div>' + escapeHTML(text) + '</div>';
}

function buildAnswerKey(answer) {
  if (!answer) return '';
  const isVerdict = ['TRUE','FALSE','NOT GIVEN','YES','NO'].includes(answer);
  return '<div class="answer-key"><div class="ak-label">' + (isVerdict ? 'Answer:' : 'Answer Key:') + '</div><div class="ak-value">' + escapeHTML(answer) + '</div></div>';
}

function buildCardHeader(id, book, index, total) {
  return '<div class="card-header"><span class="card-id">' + escapeHTML(id) + ' &middot; Book ' + escapeHTML(book) + '</span><span class="card-progress">' + (index + 1) + ' / ' + total + '</span></div>';
}

/* ============================================================
   TOAST NOTIFICATIONS
   ============================================================ */
function showToast(message, type = 'info', explanation = '') {
  const toast = document.createElement('div');
  toast.className = 'toast toast-' + type;
  let html = message;
  if (explanation) html += '<div style="margin-top:0.3rem;font-size:0.8rem;opacity:0.9;">' + explanation + '</div>';
  toast.innerHTML = html;
  document.body.appendChild(toast);

  setTimeout(() => {
    toast.classList.add('hide');
    setTimeout(() => toast.remove(), 300);
  }, type === 'info' ? 3000 : 4000);
}

/* ============================================================
   CONFETTI BURST
   ============================================================ */
function createConfetti(x, y) {
  const confetti = document.createElement('div');
  confetti.className = 'confetti-burst';
  confetti.style.left = x + 'px';
  confetti.style.top = y + 'px';
  const angle = Math.random() * Math.PI * 2;
  const distance = 100 + Math.random() * 100;
  const tx = Math.cos(angle) * distance;
  const ty = Math.sin(angle) * distance - 50;
  confetti.style.setProperty('--tx', tx + 'px');
  confetti.style.setProperty('--ty', ty + 'px');
  document.body.appendChild(confetti);
  setTimeout(() => confetti.remove(), 600);
}

function burstConfetti() {
  const x = window.innerWidth / 2;
  const y = window.innerHeight / 2;
  for (let i = 0; i < 12; i++) {
    setTimeout(() => createConfetti(x, y), i * 30);
  }
}

/* ============================================================
   SAME-PASSAGE MISMATCH
   ============================================================ */
function getSamePassageMismatch(currentPair, allPairs) {
  const samePassage = allPairs.filter(p => p.pid === currentPair.pid && p.id !== currentPair.id);
  if (samePassage.length > 0) {
    return samePassage[Math.floor(Math.random() * samePassage.length)].p;
  }
  const sameBook = allPairs.filter(p => p.book === currentPair.book && p.id !== currentPair.id);
  if (sameBook.length > 0) {
    return sameBook[Math.floor(Math.random() * sameBook.length)].p;
  }
  const idx = Math.floor(Math.random() * allPairs.length);
  return allPairs[idx].p;
}

/* ============================================================
   PERSISTENCE & FIREBASE
   ============================================================ */
const STORAGE_PREFIX = 'ielts_para_';
let firebaseReady = false;

function initFirebase() {
  try {
    if (typeof firebase !== 'undefined' && firebase.initializeApp) {
      firebase.initializeApp(FIREBASE_CONFIG);
      db = firebase.firestore();
      firebaseReady = true;
    }
  } catch (e) {
    console.warn('Firebase init failed:', e);
  }
}

function loadUserData(userId) {
  try {
    const raw = localStorage.getItem(STORAGE_PREFIX + userId);
    if (raw) return JSON.parse(raw);
  } catch (e) { }
  return null;
}

function saveUserData(userId, data) {
  try {
    localStorage.setItem(STORAGE_PREFIX + userId, JSON.stringify(data));
    if (firebaseReady && db) {
      const update = { paraphraseStats: data, lastSync: new Date().toISOString() };
      db.collection('students').doc(userId).set(update, { merge: true }).catch(err => console.warn('Firestore sync failed:', err));
    }
  } catch (e) { }
}

function loadFirebaseData(userId) {
  if (!firebaseReady || !db) return Promise.resolve(null);
  return db.collection('students').doc(userId).get().then(doc => {
    if (doc.exists && doc.data().paraphraseStats) return doc.data().paraphraseStats;
    return null;
  }).catch(err => {
    console.warn('Firestore load failed:', err);
    return null;
  });
}

function updateLeaderboard(userId, name, data) {
  if (!firebaseReady || !db) return;
  const accuracy = data.totalAttempted > 0 ? Math.round(1000 * data.totalCorrect / data.totalAttempted) / 10 : 0;
  db.collection('paraphrase_leaderboard').doc(userId).set({
    name: name.split('_').pop(),
    totalCorrect: data.totalCorrect,
    totalAttempted: data.totalAttempted,
    accuracy: accuracy,
    streak: getStreak(userId),
    lastActive: new Date().toISOString()
  }, { merge: true }).catch(err => console.warn('Leaderboard update failed:', err));
}

function createFreshStats() {
  const trickStats = {};
  TRICK_KEYS.forEach(k => { trickStats[k] = { correct: 0, total: 0 }; });
  return { trickStats, totalCorrect: 0, totalAttempted: 0, lastDate: null, sessions: 0 };
}

/* ============================================================
   STREAK TRACKING
   ============================================================ */
function getStreak(userId) {
  try {
    const raw = localStorage.getItem(STORAGE_PREFIX + userId + '_streak');
    if (raw) {
      const streak = JSON.parse(raw);
      const today = new Date().toISOString().split('T')[0];
      if (streak.lastDate === today) return streak.count;
    }
  } catch (e) { }
  return 0;
}

function updateStreak(userId, sessionAttempts) {
  try {
    const today = new Date().toISOString().split('T')[0];
    let streak = { count: 1, lastDate: today };
    const raw = localStorage.getItem(STORAGE_PREFIX + userId + '_streak');
    if (raw) {
      const prev = JSON.parse(raw);
      const yesterday = new Date(new Date().getTime() - 86400000).toISOString().split('T')[0];
      if (prev.lastDate === today) {
        streak.count = prev.count;
      } else if (prev.lastDate === yesterday && sessionAttempts >= 5) {
        streak.count = prev.count + 1;
      } else if (sessionAttempts >= 5) {
        streak.count = 1;
      }
    } else if (sessionAttempts >= 5) {
      streak.count = 1;
    }
    localStorage.setItem(STORAGE_PREFIX + userId + '_streak', JSON.stringify(streak));
    return streak.count;
  } catch (e) { }
  return 0;
}

/* ============================================================
   STATE
   ============================================================ */
const state = {
  screen: 'login',
  userId: null,
  userData: null,
  filter: 'all',
  book: 'all',
  shuffleOn: true,
  pairs: [],
  currentIndex: 0,
  answered: false,
  locked: false,
  lastAnswer: null,
  sessionStreak: 0,
  sessionAttempts: 0,
  roundQuestions: 0,
  currentIsReal: true,
  currentFakePassage: '',
  timerInterval: null,
  timeLeft: 0,
  speedDone: undefined,
  speedCorrect: 0,
  ngItems: null,
  ngIndex: 0
};

/* ============================================================
   FILTERING
   ============================================================ */
function getFilteredPairs() {
  let pairs = [...ALL_PAIRS];
  if (state.book !== 'all') pairs = pairs.filter(p => p.book === state.book);
  if (state.filter === 'combo') pairs = pairs.filter(p => p.t.length > 1);
  else if (state.filter !== 'all') pairs = pairs.filter(p => p.t.includes(state.filter));
  return pairs;
}

function getFilteredNG() {
  let items = [...ALL_NG];
  if (state.book !== 'all') items = items.filter(n => n.book === state.book);
  return items;
}

function applyFilters() {
  let pairs = getFilteredPairs();
  if (state.shuffleOn) shuffleArray(pairs);
  state.pairs = pairs;
  state.currentIndex = 0;
  state.answered = false;
  state.locked = false;
  prepareRecogniseItem();
  document.getElementById('statTotal').textContent = pairs.length;
}

function prepareRecogniseItem() {
  if (!state.pairs.length) return;
  const pair = state.pairs[state.currentIndex];
  state.currentIsReal = Math.random() > 0.35;
  if (!state.currentIsReal) {
    state.currentFakePassage = getSamePassageMismatch(pair, state.pairs);
  }
}

/* ============================================================
   SCORING
   ============================================================ */
function recordCorrect(trickKeys) {
  if (!state.userData) return;
  state.userData.totalCorrect++;
  state.userData.totalAttempted++;
  state.sessionStreak++;
  state.sessionAttempts++;
  state.roundQuestions++;
  trickKeys.forEach(k => {
    if (state.userData.trickStats[k]) {
      state.userData.trickStats[k].correct++;
      state.userData.trickStats[k].total++;
    }
  });
  saveUserData(state.userId, state.userData);
  updateLeaderboard(state.userId, state.userId, state.userData);
}

function recordWrong(trickKeys) {
  if (!state.userData) return;
  state.userData.totalAttempted++;
  state.sessionStreak = 0;
  state.sessionAttempts++;
  state.roundQuestions++;
  trickKeys.forEach(k => {
    if (state.userData.trickStats[k]) {
      state.userData.trickStats[k].total++;
    }
  });
  saveUserData(state.userId, state.userData);
  updateLeaderboard(state.userId, state.userId, state.userData);
}

function getWeakestTrick() {
  if (!state.userData) return null;
  let weakest = null;
  let lowestPct = 101;
  TRICK_KEYS.forEach(k => {
    const s = state.userData.trickStats[k];
    if (s.total >= 3) {
      const pct = Math.round(100 * s.correct / s.total);
      if (pct < lowestPct) { lowestPct = pct; weakest = k; }
    }
  });
  return weakest && lowestPct < 70 ? { trick: weakest, pct: lowestPct } : null;
}

/* ============================================================
   MASTERY BAR & STREAK DISPLAY
   ============================================================ */
function updateMasteryBar() {
  const bar = document.getElementById('masteryBar');
  if (!bar || !state.userData) return;
  let html = '';
  TRICK_KEYS.forEach(k => {
    const s = state.userData.trickStats[k];
    const trick = TRICKS[k];
    const pct = s.total > 0 ? Math.round(100 * s.correct / s.total) : 0;
    const cls = s.total >= 3 ? (pct >= 70 ? 'strong' : pct < 50 ? 'weak' : '') : '';
    html += '<div class="mastery-item ' + cls + '"><div class="mi-name" style="color:' + trick.color + ';">' + escapeHTML(trick.name) + '</div><div class="mi-pct">' + (s.total > 0 ? pct + '%' : '\u2014') + '</div><div class="mi-count">' + s.correct + '/' + s.total + '</div></div>';
  });
  bar.innerHTML = html;
  updateStreakDisplay();
}

function updateStreakDisplay() {
  const display = document.getElementById('streakDisplay');
  if (!display || !state.userId) return;
  const streak = getStreak(state.userId);
  if (streak > 0) {
    display.innerHTML = '🔥 ' + streak;
    display.style.display = 'inline-flex';
  } else {
    display.style.display = 'none';
  }
}

/* ============================================================
   MODE SWITCHING
   ============================================================ */
function switchMode(mode) {
  state.screen = mode;
  state.answered = false;
  state.locked = false;
  state.roundQuestions = 0;
  clearTimer();
  if (mode === 'notgiven') { state.ngItems = null; state.ngIndex = 0; }
  if (mode === 'speed') { state.speedDone = undefined; }
  document.querySelectorAll('.mode-tab').forEach(t => t.setAttribute('aria-selected', t.dataset.mode === mode ? 'true' : 'false'));
  document.getElementById('toolbar').style.display = mode === 'welcome' || mode === 'login' ? 'none' : '';
  document.getElementById('masteryBar').style.display = mode === 'login' ? 'none' : '';
  applyFilters();
  render();
}

function nextPair() {
  state.currentIndex++;
  state.answered = false;
  state.locked = false;
  if (state.currentIndex >= state.pairs.length) { state.currentIndex = 0; if (state.shuffleOn) shuffleArray(state.pairs); }
  prepareRecogniseItem();
  checkRoundSummary();
  render();
}

function checkRoundSummary() {
  if (state.roundQuestions >= 10 && state.screen !== 'welcome' && state.screen !== 'login' && state.screen !== 'speed') {
    showRoundSummary();
  }
}

function showRoundSummary() {
  const accuracy = state.userData.totalAttempted > 0 ? Math.round(100 * state.userData.totalCorrect / state.userData.totalAttempted) : 0;
  const weak = getWeakestTrick();
  const weakHTML = weak ? '<div style="margin:1rem 0;padding:0.75rem 1rem;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:8px;font-size:0.82rem;"><strong style="color:var(--wrong);">Suggested focus:</strong> ' + escapeHTML(TRICKS[weak.trick].name) + ' (' + weak.pct + '%)</div>' : '';

  let masteryBarsHTML = '<div class="mastery-bars">';
  TRICK_KEYS.forEach(k => {
    const s = state.userData.trickStats[k];
    const trick = TRICKS[k];
    const pct = s.total > 0 ? Math.round(100 * s.correct / s.total) : 0;
    const fillPct = Math.min(pct, 100);
    masteryBarsHTML += '<div class="mastery-bar-item"><div class="mastery-bar-label" style="color:' + trick.color + ';">' + escapeHTML(trick.name) + '</div><div class="mastery-bar-track"><div class="mastery-bar-fill" style="width:' + fillPct + '%;background:' + trick.color + ';"></div></div><div class="mastery-bar-pct">' + (s.total > 0 ? pct + '%' : '\u2014') + '</div></div>';
  });
  masteryBarsHTML += '</div>';

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = '<div class="modal-content"><div class="modal-header"><h2 style="margin:0;font-family:DM Serif Display,serif;font-size:1.3rem;">Round Summary</h2><button class="modal-close" onclick="this.parentElement.parentElement.remove()">&times;</button></div><div style="font-size:0.85rem;"><div class="summary-stats"><div class="summary-stat"><div class="summary-stat-big">' + accuracy + '%</div><div class="summary-stat-label">Accuracy</div></div><div class="summary-stat"><div class="summary-stat-big">' + state.userData.totalCorrect + '</div><div class="summary-stat-label">Total Correct</div></div></div>' + weakHTML + '<div style="margin-top:1.5rem;"><strong style="color:var(--text);">Trick Mastery:</strong></div>' + masteryBarsHTML + '<div style="display:flex;gap:0.5rem;margin-top:1.5rem;"><button class="btn btn-primary" onclick="closeModalAndRender()" style="flex:1;">Continue</button><button class="btn btn-outline" data-action="mode" data-mode="welcome" onclick="closeModalAndSwitchMode(this)" style="flex:1;">Home</button></div></div>';
  document.body.appendChild(overlay);
}

function closeModalAndRender() {
  document.querySelector('.modal-overlay').remove();
  state.roundQuestions = 0;
  render();
}

function closeModalAndSwitchMode(btn) {
  document.querySelector('.modal-overlay').remove();
  switchMode(btn.dataset.mode);
}

function setFilter(filter) {
  state.filter = filter;
  document.querySelectorAll('.tool-btn[data-action="filter"]').forEach(b => b.setAttribute('aria-pressed', b.dataset.t === filter ? 'true' : 'false'));
  applyFilters();
  if (state.screen === 'notgiven') { state.ngItems = null; state.ngIndex = 0; }
  render();
}

function setBook(book) {
  state.book = book;
  applyFilters();
  if (state.screen === 'notgiven') { state.ngItems = null; state.ngIndex = 0; }
  render();
}

/* ============================================================
   TIMER
   ============================================================ */
function clearTimer() { if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; } }
function startTimer() {
  clearTimer(); state.timeLeft = 150;
  state.timerInterval = setInterval(() => {
    state.timeLeft--;
    if (state.timeLeft <= 0) { clearTimer(); state.speedDone++; const p = state.pairs[state.currentIndex]; if (p) recordWrong(p.t); if (state.speedDone < 10) { state.currentIndex = (state.currentIndex + 1) % state.pairs.length; state.answered = false; state.locked = false; startTimer(); } render(); updateMasteryBar(); }
    else { const b = document.querySelector('.timer-fill'), e = document.getElementById('speedTimer'); if (b) { const pct = (state.timeLeft / 150) * 100; b.style.width = pct + '%'; if (pct < 30) b.classList.add('danger'); } if (e) e.textContent = Math.ceil(state.timeLeft / 10) + 's'; }
  }, 100);
}

/* ============================================================
   ANSWER HANDLERS
   ============================================================ */
function answerRecognise(userSaidYes) {
  if (state.locked) return;
  state.locked = true; state.answered = true;
  state.lastAnswer = { userSaidYes, isRealMatch: state.currentIsReal };
  const correct = userSaidYes === state.currentIsReal;
  if (correct) {
    recordCorrect(state.currentIsReal ? state.pairs[state.currentIndex].t : []);
    showToast('✓ Correct!', 'correct');
    burstConfetti();
  } else {
    recordWrong(state.currentIsReal ? state.pairs[state.currentIndex].t : []);
    const feedback = state.currentIsReal ? 'These ARE a match. The words differ but meaning is the same.' : 'These are NOT a match. This sentence answers a different question.';
    showToast('✗ Not quite', 'wrong', feedback);
  }
  render(); updateMasteryBar();
}

function answerClassify(trickKey) {
  if (state.locked) return;
  state.locked = true; state.answered = true; state.lastAnswer = trickKey;
  const pair = state.pairs[state.currentIndex];
  const correct = pair.t.includes(trickKey);
  if (correct) {
    recordCorrect(pair.t);
    showToast('✓ Correct!', 'correct', 'You identified the trick');
    burstConfetti();
  } else {
    recordWrong(pair.t);
    showToast('✗ Not quite', 'wrong', 'The main trick is ' + TRICKS[pair.t[0]].name);
  }
  render(); updateMasteryBar();
}

function record(isCorrect, trickKeys) {
  if (isCorrect) recordCorrect(trickKeys);
  else recordWrong(trickKeys);
}

function answerNotGiven(userSaidNG) {
  if (state.locked) return;
  state.locked = true; state.answered = true; state.lastAnswer = userSaidNG;
  const item = state.ngItems[state.ngIndex];
  const correct = userSaidNG === item.isNG;
  if (correct) {
    record(true, item.isNG ? [] : (item.t || []));
    showToast('✓ Correct!', 'correct');
    burstConfetti();
  } else {
    record(false, item.isNG ? [] : (item.t || []));
    const feedback = item.isNG ? 'This passage sentence does NOT answer the question.' : 'This passage sentence DOES answer the question.';
    showToast('✗ Not quite', 'wrong', feedback);
  }
  render(); updateMasteryBar();
}

function answerSpeed(trickKey) {
  if (state.locked) return;
  state.locked = true; state.answered = true; state.lastAnswer = trickKey; clearTimer();
  const pair = state.pairs[state.currentIndex];
  const isCorrect = pair.t.includes(trickKey);
  state.speedDone++; if (isCorrect) state.speedCorrect++;
  record(isCorrect, pair.t);
  if (isCorrect) burstConfetti();
  render(); updateMasteryBar();
  setTimeout(() => { if (state.speedDone < 10) { state.currentIndex = (state.currentIndex + 1) % state.pairs.length; state.answered = false; state.locked = false; startTimer(); render(); } else { state.locked = false; render(); } }, 1200);
}

function startSpeedRound() {
  state.speedDone = 0; state.speedCorrect = 0; state.currentIndex = 0; state.answered = false; state.locked = false;
  if (state.shuffleOn) shuffleArray(state.pairs); startTimer(); render();
}

/* ============================================================
   LOGIN & LEADERBOARD
   ============================================================ */
function loginUser(userId) {
  state.userId = userId;
  loadFirebaseData(userId).then(fbData => {
    let data = fbData || loadUserData(userId);
    if (!data) {
      data = createFreshStats();
      data.sessions = 1;
      data.lastDate = new Date().toISOString().split('T')[0];
      saveUserData(userId, data);
    } else {
      data.sessions++;
      data.lastDate = new Date().toISOString().split('T')[0];
      saveUserData(userId, data);
    }
    state.userData = data;
    const streak = getStreak(userId);
    if (state.sessionAttempts >= 5) updateStreak(userId, state.sessionAttempts);
    switchMode('welcome');
  });
}

function showLeaderboard() {
  if (!firebaseReady || !db) {
    showToast('Leaderboard not available', 'info');
    return;
  }
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = '<div class="modal-content" style="max-width:500px;"><div class="modal-header"><h2 style="margin:0;font-family:DM Serif Display,serif;font-size:1.3rem;">🏆 Leaderboard</h2><button class="modal-close" onclick="this.parentElement.parentElement.remove()">&times;</button></div><div id="leaderboardContent" style="min-height:200px;"><p style="color:var(--text-muted);text-align:center;">Loading leaderboard...</p></div></div>';
  document.body.appendChild(overlay);

  db.collection('paraphrase_leaderboard')
    .orderBy('accuracy', 'desc')
    .where('totalAttempted', '>=', 20)
    .limit(20)
    .get()
    .then(snap => {
      let html = '<div class="leaderboard-list">';
      if (snap.empty) {
        html = '<div class="leaderboard-empty">No leaderboard data yet. Keep training!</div>';
      } else {
        let rank = 1;
        snap.forEach(doc => {
          const d = doc.data();
          html += '<div class="leaderboard-entry"><div class="leaderboard-rank">#' + rank + '</div><div class="leaderboard-name"><div class="leaderboard-name-primary">' + escapeHTML(d.name || 'Student') + '</div><div class="leaderboard-name-sub">' + d.totalCorrect + '/' + d.totalAttempted + ' correct</div></div><div class="leaderboard-accuracy">' + (d.accuracy || 0) + '%</div></div>';
          rank++;
        });
      }
      html += '</div>';
      document.getElementById('leaderboardContent').innerHTML = html;
    })
    .catch(err => {
      console.warn('Leaderboard fetch failed:', err);
      document.getElementById('leaderboardContent').innerHTML = '<div class="leaderboard-empty">Could not load leaderboard</div>';
    });
}

/* ============================================================
   RENDERERS
   ============================================================ */
function render() {
  const el = document.getElementById('mainContent');
  const renderers = { login: renderLogin, welcome: renderWelcome, recognise: renderRecognise, classify: renderClassify, notgiven: renderNotGiven, speed: renderSpeed };
  el.innerHTML = (renderers[state.screen] || renderLogin)();
  updateMasteryBar();
}

function renderLogin() {
  let returningHTML = '';
  const allKeys = [];
  for (let i = 0; i < localStorage.length; i++) { const key = localStorage.key(i); if (key && key.startsWith(STORAGE_PREFIX) && !key.includes('_streak')) allKeys.push(key.replace(STORAGE_PREFIX, '')); }
  if (allKeys.length > 0) {
    returningHTML = '<div class="recent-logins"><p class="recent-logins-label">Returning? Select your ID:</p><div class="recent-logins-buttons">';
    allKeys.slice(0, 3).forEach(k => {
      const userData = loadUserData(k);
      const stats = userData ? userData.totalCorrect + '/' + userData.totalAttempted : '0/0';
      returningHTML += '<button class="recent-login-btn" data-action="login-return" data-uid="' + escapeHTML(k) + '"><div>' + escapeHTML(k) + '</div><div class="recent-login-stats">' + stats + ' correct</div></button>';
    });
    returningHTML += '</div></div>';
  }
  return '<div class="login-screen"><h2>IELTS Paraphrase Trainer</h2><p>Train yourself to see through the 6 tricks IELTS uses to disguise answers in the reading test.</p>' + returningHTML +
    '<div class="login-field"><label>Login ID</label><input type="text" id="loginId" placeholder="john_doe" maxlength="30"></div>' +
    '<div class="login-hint">Choose any username to track your progress. Use the same ID every time.</div>' +
    '<div class="btn-row" style="margin-top:1.25rem;"><button class="btn btn-primary" data-action="login-submit" style="font-size:1rem;">Start Training</button></div></div>';
}

function renderWelcome() {
  const userData = state.userData;
  const totalPct = userData.totalAttempted > 0 ? Math.round(100 * userData.totalCorrect / userData.totalAttempted) : 0;
  const weak = getWeakestTrick();
  const firstName = state.userId.split('_').pop() || state.userId;

  let summaryHTML = '';
  if (userData.totalAttempted > 0) {
    summaryHTML = '<div class="login-welcome">Overall: <strong>' + userData.totalCorrect + '/' + userData.totalAttempted + ' correct (' + totalPct + '%)</strong> &middot; Session ' + userData.sessions + '</div>';
  }

  let weakHTML = '';
  if (weak) {
    weakHTML = '<div class="weak-suggest"><strong>Suggested focus:</strong> Your ' + escapeHTML(TRICKS[weak.trick].name) + ' accuracy is ' + weak.pct + '%. Try practising that trick today using the filter bar.</div>';
  }

  const disclaimerHTML = '<div style="margin:1rem 0;padding:0.65rem 0.85rem;background:rgba(59,130,246,0.06);border:1px solid rgba(59,130,246,0.15);border-radius:8px;font-size:0.78rem;color:var(--text-dim);text-align:left;line-height:1.5;">' +
    '<strong style="color:var(--p-color);">Where do these 6 tricks apply?</strong><br>' +
    'These tricks work for <strong>detail questions</strong>: True/False/Not Given, Completion, Matching Features, Sentence Endings.<br>' +
    'For <strong>Matching Headings</strong> and <strong>main idea</strong> questions, you need to understand what the whole paragraph is about \u2014 not match individual words.</div>';

  return '<div class="welcome"><h2>Welcome, ' + escapeHTML(firstName) + '!</h2>' + summaryHTML + weakHTML + disclaimerHTML +
    '<div class="mode-card" tabindex="0" role="button" data-action="mode" data-mode="recognise"><h3>&#9989; Recognise</h3><p>Do these mean the same thing? Yes or No. Fake mismatches come from the SAME passage \u2014 just like the real test.</p></div>' +
    '<div class="mode-card" tabindex="0" role="button" data-action="mode" data-mode="classify"><h3>&#127991;&#65039; Classify</h3><p>Which trick is IELTS using? Pick from 6 types. See detailed breakdowns after each answer.</p></div>' +
    '<div class="mode-card" tabindex="0" role="button" data-action="mode" data-mode="notgiven"><h3>&#10067; NOT GIVEN</h3><p>See a question and a passage sentence. Is it a real match, or does the passage NOT actually answer the question? The hardest IELTS skill.</p></div>' +
    '<div class="mode-card" tabindex="0" role="button" data-action="mode" data-mode="speed"><h3>&#9889; Speed</h3><p>15 seconds per question. Classify the trick under pressure. 10 questions per round.</p></div>' +
    '<div style="text-align:center;margin-top:1rem;"><button class="btn btn-outline" data-action="logout" style="font-size:0.78rem;flex:none;min-width:auto;">Switch User</button></div></div>';
}

function renderRecognise() {
  if (!state.pairs.length) return '<div class="card"><p>No pairs match this filter. Try changing the book or trick filter.</p></div>';
  const pair = state.pairs[state.currentIndex];
  const displayPassage = state.currentIsReal ? pair.p : state.currentFakePassage;

  let body = '<div class="card">' + buildCardHeader(pair.id, pair.book, state.currentIndex, state.pairs.length) +
    buildPhraseBlock('q', 'Question says:', pair.q) +
    buildPhraseBlock('p', 'Passage says:', displayPassage) +
    '<div class="prompt-text">Do these mean the <span style="color:var(--match-color)">SAME THING</span>?</div>';

  if (state.answered) {
    const correct = state.lastAnswer.userSaidYes === state.lastAnswer.isRealMatch;
    let msg = correct
      ? '<strong>&#10003; Correct!</strong> ' + (state.lastAnswer.isRealMatch ? 'These ARE a paraphrase match.' : 'These are NOT a match \u2014 this passage sentence answers a different question from the same passage.')
      : '<strong>&#10007; Not quite.</strong> ' + (state.lastAnswer.isRealMatch ? 'These ARE actually a match. The words differ but the meaning is the same.' : 'These are NOT a real match \u2014 this passage sentence is about the same topic but answers a different question.');
    if (state.lastAnswer.isRealMatch) {
      msg += '<br><br>' + buildAnswerKey(pair.a);
      msg += '<div style="margin-top:0.5rem;">' + pair.t.map(t => buildBadge(t)).join(' ') + '</div>';
      msg += pair.td.map(td => buildTrickExplanation(td)).join('');
    }
    body += '<div class="feedback ' + (correct ? 'feedback-correct' : 'feedback-wrong') + '">' + msg + '</div>';
    body += '<div class="btn-row"><button class="btn btn-primary" data-action="next">Next &rarr;</button></div>';
  } else {
    body += '<div class="btn-row"><button class="btn btn-correct" data-action="rec-yes" style="font-size:1rem;">&#10003; YES &mdash; Same meaning</button><button class="btn btn-wrong" data-action="rec-no" style="font-size:1rem;">&#10007; NO &mdash; Different meaning</button></div>';
  }
  return body + '</div>';
}

function renderClassify() {
  if (!state.pairs.length) return '<div class="card"><p>No pairs match this filter.</p></div>';
  const pair = state.pairs[state.currentIndex];

  let body = '<div class="card">' + buildCardHeader(pair.id, pair.book, state.currentIndex, state.pairs.length) +
    buildPhraseBlock('q', 'Question says:', pair.q) + buildPhraseBlock('p', 'Passage says:', pair.p) +
    '<div class="prompt-text">Which <span style="color:var(--t3);">TRICK</span> is IELTS using here?</div>';

  if (state.answered) {
    const correct = pair.t.includes(state.lastAnswer);
    const primaryTrick = pair.t[0];
    const answeredTrick = TRICKS[state.lastAnswer] || TRICKS[primaryTrick];
    let msg = correct
      ? '<strong>&#10003; Correct!</strong> ' + buildBadge(state.lastAnswer) + '<br><span style="font-size:0.8rem;color:var(--text-muted);">' + escapeHTML(answeredTrick.desc) + '</span>' + (pair.t.length > 1 ? '<br><br>This pair also uses: ' + pair.t.filter(t => t !== state.lastAnswer).map(t => buildBadge(t)).join(' ') : '')
      : '<strong>&#10007; Not quite.</strong> The primary trick is ' + buildBadge(primaryTrick) + '<br><span style="font-size:0.8rem;">' + escapeHTML(TRICKS[primaryTrick].desc) + '</span>' + (pair.t.length > 1 ? '<br><br>All tricks: ' + pair.t.map(t => buildBadge(t)).join(' ') : '');
    msg += '<br><br>' + buildAnswerKey(pair.a);
    msg += '<div style="margin-top:0.5rem;">' + pair.td.map(td => buildTrickExplanation(td)).join('') + '</div>';
    body += '<div class="feedback ' + (correct ? 'feedback-correct' : 'feedback-wrong') + '">' + msg + '</div>';
    body += '<div class="btn-row"><button class="btn btn-primary" data-action="next">Next &rarr;</button></div>';
  } else {
    body += '<div class="trick-grid">';
    for (const [key, trick] of Object.entries(TRICKS)) {
      body += '<button class="btn-trick" style="border-color:' + trick.color + ';" data-action="classify" data-trick="' + key + '"' + (state.locked ? ' disabled' : '') + '><span style="color:' + trick.color + ';">' + escapeHTML(trick.name) + '</span><span class="bt-name">(' + key + ')</span></button>';
    }
    body += '</div>';
  }
  return body + '</div>';
}

function renderNotGiven() {
  if (!state.ngItems) {
    const ngPairs = getFilteredNG();
    if (!ngPairs.length) return '<div class="card"><p>No NOT GIVEN items match this filter.</p></div>';
    state.ngItems = ngPairs.map(n => ({ ...n, isNG: Math.random() > 0.5 }));
  }
  if (!state.ngItems.length) return '<div class="card"><p>No items available.</p></div>';
  const item = state.ngItems[state.ngIndex];

  let body = '<div class="card">' + buildCardHeader('NG-' + (state.ngIndex + 1), item.book, state.ngIndex, state.ngItems.length) +
    buildPhraseBlock('q', 'Question:', item.q) + buildPhraseBlock('p', 'Passage:', item.p) +
    '<div class="prompt-text">Does the passage <span style="color:var(--match-color);">actually answer</span> the question?</div>';

  if (state.answered) {
    const correct = state.lastAnswer === item.isNG;
    let msg = correct
      ? item.isNG
        ? '<strong>&#10003; Correct!</strong> The passage does NOT answer this question.'
        : '<strong>&#10003; Correct!</strong> The passage DOES answer this question.' + (item.a ? '<br><br>' + buildAnswerKey(item.a) : '')
      : item.isNG
        ? '<strong>&#10007; Not quite.</strong> The passage DOES actually answer this question.' + (item.a ? '<br><br>' + buildAnswerKey(item.a) : '')
        : '<strong>&#10007; Not quite.</strong> The passage does NOT answer this question.';
    if (!item.isNG && item.a) {
      msg += '<div style="margin-top:0.5rem;">' + (item.t || []).map(t => buildBadge(t)).join(' ') + '</div>';
    }
    body += '<div class="feedback ' + (correct ? 'feedback-correct' : 'feedback-wrong') + '">' + msg + '</div>';
    body += '<div class="btn-row"><button class="btn btn-primary" data-action="advance-ng">Next &rarr;</button></div>';
  } else {
    body += '<div class="btn-row"><button class="btn btn-correct" data-action="ng-real" style="font-size:0.95rem;">&#10003; YES &mdash; It answers the question</button><button class="btn btn-ng-action" data-action="ng-notgiven" style="font-size:0.95rem;">&#10007; NO &mdash; NOT GIVEN</button></div>';
  }
  return body + '</div>';
}

function renderSpeed() {
  if (!state.pairs.length) return '<div class="card"><p>No pairs match this filter.</p></div>';
  if (state.speedDone === undefined) return '<div class="card score-card"><h2 style="font-family:DM Serif Display,serif;margin-bottom:0.5rem;">&#9889; Speed Round</h2><p style="color:var(--text-dim);font-size:0.88rem;">10 questions. 15 seconds each.<br>Identify the trick as fast as you can.</p><div class="btn-row" style="justify-content:center;margin-top:1.5rem;"><button class="btn btn-primary" data-action="start-speed" style="font-size:1rem;padding:0.75rem 2rem;">START</button></div></div>';
  if (state.speedDone >= 10) {
    const pct = Math.round(100 * state.speedCorrect / 10);
    const clr = pct >= 70 ? 'var(--correct)' : pct >= 50 ? 'var(--t3)' : 'var(--wrong)';
    return '<div class="card score-card"><div class="score-big" style="color:' + clr + ';">' + pct + '%</div><div class="score-label">Speed Round Complete &mdash; ' + state.speedCorrect + '/10 correct</div><div class="btn-row" style="justify-content:center;margin-top:1.5rem;"><button class="btn btn-primary" data-action="start-speed">New Round</button><button class="btn btn-outline" data-action="mode" data-mode="welcome">Home</button></div></div>';
  }
  const pair = state.pairs[state.currentIndex]; const pct = (state.timeLeft / 150) * 100;
  let body = '<div class="card"><div class="timer-bar" role="progressbar" aria-valuemin="0" aria-valuemax="15" aria-valuenow="' + Math.ceil(state.timeLeft / 10) + '"><div class="timer-fill' + (pct < 30 ? ' danger' : '') + '" style="width:' + pct + '%"></div></div>' +
    '<div class="card-header"><span class="card-id">SPEED ' + (state.speedDone + 1) + '/10 &middot; Book ' + escapeHTML(pair.book) + '</span><span class="card-progress" id="speedTimer" style="font-size:0.85rem;color:var(--t3);">' + Math.ceil(state.timeLeft / 10) + 's</span></div>' +
    buildPhraseBlock('q', 'Q:', pair.q) + buildPhraseBlock('p', 'P:', pair.p);
  if (state.answered) {
    const correct = pair.t.includes(state.lastAnswer);
    body += '<div class="feedback ' + (correct ? 'feedback-correct' : 'feedback-wrong') + '">' + (correct ? '&#10003;' : '&#10007;') + ' ' + buildBadge(pair.t[0]) + '</div>';
  } else {
    body += '<div class="trick-grid-3">';
    for (const [key, trick] of Object.entries(TRICKS)) {
      body += '<button class="btn-trick" style="border-color:' + trick.color + ';padding:0.4rem;" data-action="speed" data-trick="' + key + '"' + (state.locked ? ' disabled' : '') + '><span style="color:' + trick.color + ';font-size:0.8rem;">' + escapeHTML(trick.name) + '</span></button>';
    }
    body += '</div>';
  }
  return body + '</div>';
}

/* ============================================================
   EVENT DELEGATION
   ============================================================ */
document.addEventListener('click', function(e) {
  const target = e.target.closest('[data-action]');
  if (!target) return;
  const action = target.dataset.action;

  if (action === 'login-submit') {
    const id = (document.getElementById('loginId').value || '').trim();
    if (!id) { showToast('Please enter a login ID', 'wrong'); return; }
    if (id.length < 3) { showToast('Login ID must be at least 3 characters', 'wrong'); return; }
    loginUser(id);
  }
  else if (action === 'login-return') loginUser(target.dataset.uid);
  else if (action === 'logout') { state.screen = 'login'; state.userId = null; state.userData = null; state.sessionStreak = 0; document.getElementById('toolbar').style.display = 'none'; document.getElementById('masteryBar').style.display = 'none'; render(); }
  else if (action === 'mode') switchMode(target.dataset.mode);
  else if (action === 'filter') setFilter(target.dataset.t);
  else if (action === 'next') nextPair();
  else if (action === 'rec-yes') answerRecognise(true);
  else if (action === 'rec-no') answerRecognise(false);
  else if (action === 'classify') answerClassify(target.dataset.trick);
  else if (action === 'speed') answerSpeed(target.dataset.trick);
  else if (action === 'start-speed') startSpeedRound();
  else if (action === 'ng-real') answerNotGiven(false);
  else if (action === 'ng-notgiven') answerNotGiven(true);
  else if (action === 'advance-ng') { state.ngIndex++; state.answered = false; state.locked = false; checkRoundSummary(); render(); }
  else if (action === 'restart-ng') { state.ngItems = null; state.ngIndex = 0; state.answered = false; state.locked = false; render(); }
});

document.getElementById('bookSelect').addEventListener('change', function() { setBook(this.value); });
document.getElementById('shuffleToggle').addEventListener('change', function() { state.shuffleOn = this.checked; applyFilters(); if (state.screen === 'notgiven') { state.ngItems = null; state.ngIndex = 0; } render(); });
document.getElementById('leaderboardBtn').addEventListener('click', showLeaderboard);
document.addEventListener('keydown', function(e) { if (e.key === 'Enter' || e.key === ' ') { const t = e.target.closest('[role="button"]'); if (t) { e.preventDefault(); t.click(); } } });

/* INIT — Firebase & Data Loading */
initFirebase();

(function loadData() {
  const main = document.getElementById('mainContent');
  main.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:60vh;"><div style="text-align:center;"><div style="font-size:2rem;margin-bottom:1rem;">⏳</div><p style="color:var(--text-dim);font-size:0.9rem;">Loading 1,210 paraphrase pairs...</p></div></div>';
  fetch('data.json')
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(data) {
      ALL_PAIRS = data.pairs;
      ALL_NG = data.ng;
      DATA_LOADED = true;
      document.getElementById('leaderboardBtn').style.display = '';
      render();
    })
    .catch(function(err) {
      main.innerHTML = '<div style="padding:2rem;text-align:center;"><p style="color:var(--wrong);font-size:1rem;margin-bottom:1rem;">⚠️ Could not load training data.</p><p style="color:var(--text-dim);font-size:0.85rem;">Make sure <code>data.json</code> is in the same folder as this page.</p><p style="color:var(--text-muted);font-size:0.75rem;margin-top:0.5rem;">Error: ' + err.message + '</p><button onclick="location.reload()" style="margin-top:1rem;padding:0.5rem 1.5rem;background:var(--t3);color:#000;border:none;border-radius:8px;font-weight:600;cursor:pointer;">Retry</button></div>';
    });
})();

</script>
