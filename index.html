<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IELTS Paraphrase Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0F172A;--surface:#1E293B;--surface2:#334155;--text:#F1F5F9;--text-dim:#94A3B8;--text-muted:#64748B;--border:#475569;--t1:#3B82F6;--t2:#8B5CF6;--t3:#F59E0B;--t4:#10B981;--t5:#EC4899;--t6:#EF4444;--ng:#6B7280;--q-color:#F97316;--p-color:#3B82F6;--match-color:#10B981;--correct:#10B981;--wrong:#EF4444;--radius:12px;--focus-ring:0 0 0 2px var(--bg),0 0 0 4px var(--t3);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
:focus-visible{outline:none;box-shadow:var(--focus-ring);border-radius:4px;}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);border:0;}

/* HEADER */
.app-header{background:linear-gradient(135deg,#1E293B,#0F172A);border-bottom:1px solid var(--border);padding:1rem 1.25rem;text-align:center;position:sticky;top:0;z-index:100;}
.app-title{font-family:'DM Serif Display',serif;font-size:1.35rem;}
.app-subtitle{font-size:0.75rem;color:var(--text-dim);margin-top:0.15rem;}

/* MASTERY BAR */
.mastery-bar{display:flex;gap:0.3rem;padding:0.5rem 0.6rem;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;align-items:center;justify-content:center;flex-wrap:wrap;}
.mastery-item{font-size:0.62rem;padding:0.25rem 0.5rem;border-radius:6px;border:1px solid var(--border);background:var(--surface2);text-align:center;min-width:60px;}
.mastery-item .mi-name{font-weight:600;margin-bottom:0.1rem;white-space:nowrap;}
.mastery-item .mi-pct{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:0.75rem;}
.mastery-item .mi-count{font-size:0.58rem;color:var(--text-muted);}
.mastery-item.weak{border-color:var(--wrong);background:rgba(239,68,68,0.08);}
.mastery-item.strong{border-color:var(--correct);background:rgba(16,185,129,0.08);}
.streak-pill{font-family:'JetBrains Mono',monospace;font-size:0.68rem;padding:0.2rem 0.5rem;border-radius:20px;background:var(--surface2);color:var(--text-dim);margin-left:auto;}
.streak-pill .val{color:var(--t3);font-weight:700;}

/* TABS */
.mode-tabs{display:flex;gap:0.3rem;padding:0.5rem 0.6rem;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;}
.mode-tab{font-size:0.72rem;font-weight:600;padding:0.42rem 0.7rem;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;white-space:nowrap;transition:all 0.2s;}
.mode-tab:hover{color:var(--text);border-color:var(--text-muted);}
.mode-tab[aria-selected="true"]{background:var(--t3);color:#000;border-color:var(--t3);}

/* TOOLBAR */
.toolbar{display:flex;gap:0.35rem;padding:0.45rem 0.75rem;flex-wrap:wrap;align-items:center;background:rgba(30,41,59,0.5);border-bottom:1px solid var(--border);}
.toolbar-label{font-size:0.65rem;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;margin-right:0.2rem;}
.tool-btn{font-size:0.65rem;font-weight:600;padding:0.22rem 0.5rem;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;transition:all 0.15s;}
.tool-btn:hover{border-color:var(--text-muted);}
.tool-btn[aria-pressed="true"]{color:#fff;border-color:transparent;}
.tool-btn[data-t="all"][aria-pressed="true"]{background:var(--text-muted);}
.tool-btn[data-t="T1"][aria-pressed="true"]{background:var(--t1);}
.tool-btn[data-t="T2"][aria-pressed="true"]{background:var(--t2);}
.tool-btn[data-t="T3"][aria-pressed="true"]{background:var(--t3);color:#000;}
.tool-btn[data-t="T4"][aria-pressed="true"]{background:var(--t4);}
.tool-btn[data-t="T5"][aria-pressed="true"]{background:var(--t5);}
.tool-btn[data-t="T6"][aria-pressed="true"]{background:var(--t6);}
.tool-btn[data-t="combo"][aria-pressed="true"]{background:linear-gradient(135deg,var(--t2),var(--t5));}
.tool-btn .filter-count{font-family:'JetBrains Mono',monospace;font-size:0.55rem;font-weight:400;opacity:0.7;margin-left:0.2rem;}
.qt-badge{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:0.6rem;font-weight:500;padding:0.12rem 0.4rem;border-radius:4px;background:rgba(148,163,184,0.12);color:var(--text-muted);border:1px solid rgba(148,163,184,0.15);vertical-align:middle;margin-left:0.4rem;}
.review-badge{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:0.58rem;font-weight:700;padding:0.12rem 0.4rem;border-radius:4px;background:rgba(245,158,11,0.12);color:var(--t3);border:1px solid rgba(245,158,11,0.25);vertical-align:middle;margin-left:0.3rem;}
.evidence-prompt{margin-top:1rem;padding:1rem;background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.2);border-radius:10px;text-align:center;}
.evidence-title{font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--match-color);margin-bottom:0.4rem;}
.evidence-hint{font-size:0.78rem;color:var(--text-dim);margin-bottom:0.75rem;line-height:1.5;}
.evidence-input{width:100%;max-width:360px;padding:0.6rem 0.85rem;font-family:'JetBrains Mono',monospace;font-size:0.88rem;background:var(--surface);color:var(--text);border:2px solid var(--match-color);border-radius:8px;text-align:center;outline:none;}
.evidence-input:focus{box-shadow:0 0 0 3px rgba(16,185,129,0.25);}
.evidence-result{margin-top:0.75rem;padding:0.5rem 0.75rem;border-radius:8px;font-size:0.82rem;line-height:1.5;}
.evidence-hit{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.25);color:var(--correct);}
.evidence-miss{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);color:var(--text-dim);}
.evidence-skip{background:rgba(148,163,184,0.08);border:1px solid rgba(148,163,184,0.15);color:var(--text-muted);font-size:0.78rem;}
.ev-word-area{padding:0.75rem;background:var(--surface);border-radius:8px;margin-bottom:0.5rem;}
.ev-word-area .ev-label{font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.4rem;display:block;}
.ev-label-q{color:var(--q-color);}.ev-label-p{color:var(--p-color);}
.ev-tokens{display:flex;flex-wrap:wrap;gap:0.3rem;line-height:1.6;}
.ev-tok{display:inline-block;padding:0.18rem 0.35rem;border-radius:5px;font-size:0.88rem;cursor:pointer;border:2px solid transparent;transition:all 0.15s;user-select:none;-webkit-user-select:none;position:relative;}
.ev-tok:hover{background:rgba(255,255,255,0.06);}
.ev-tok.sel-q{background:rgba(249,115,22,0.18);border-color:var(--q-color);color:var(--q-color);font-weight:600;}
.ev-tok.sel-p{background:rgba(59,130,246,0.18);border-color:var(--p-color);color:var(--p-color);font-weight:600;}
.ev-tok.matched-q{background:rgba(16,185,129,0.15);border-color:var(--correct);color:var(--correct);font-weight:600;}
.ev-tok.matched-p{background:rgba(16,185,129,0.15);border-color:var(--correct);color:var(--correct);font-weight:600;}
.ev-tok.missed-q{background:rgba(239,68,68,0.12);border-color:var(--wrong);color:var(--wrong);font-weight:600;text-decoration:underline;}
.ev-tok.missed-p{background:rgba(239,68,68,0.12);border-color:var(--wrong);color:var(--wrong);font-weight:600;text-decoration:underline;}
.ev-conn-badge{position:absolute;top:-8px;right:-6px;width:16px;height:16px;border-radius:50%;font-size:0.55rem;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;}
.ev-conn-badge-q{background:var(--q-color);color:#fff;}
.ev-conn-badge-p{background:var(--p-color);color:#fff;}
.ev-conn-badge-ok{background:var(--correct);color:#fff;}
.ev-conn-badge-miss{background:var(--wrong);color:#fff;}
.ev-instructions{text-align:center;font-size:0.78rem;color:var(--text-dim);padding:0.5rem 0;line-height:1.6;}
.ev-instructions strong{color:var(--text);}
.ev-step-indicator{display:flex;justify-content:center;gap:0.75rem;margin:0.5rem 0;font-size:0.75rem;font-weight:600;}
.ev-step{padding:0.25rem 0.6rem;border-radius:6px;opacity:0.4;}
.ev-step.active{opacity:1;}
.ev-step-q{color:var(--q-color);border:1px solid var(--q-color);}
.ev-step-p{color:var(--p-color);border:1px solid var(--p-color);}
.ev-connections-list{margin-top:0.5rem;font-size:0.78rem;color:var(--text-dim);}
.ev-conn-item{display:inline-flex;align-items:center;gap:0.3rem;padding:0.2rem 0.5rem;background:var(--surface2);border-radius:6px;margin:0.15rem;font-family:'JetBrains Mono',monospace;font-size:0.72rem;}
.ev-conn-item .conn-q{color:var(--q-color);}.ev-conn-item .conn-p{color:var(--p-color);}
.ev-conn-item .conn-arrow{color:var(--text-muted);}
.ev-conn-remove{cursor:pointer;color:var(--wrong);font-weight:700;margin-left:0.2rem;font-size:0.8rem;}
.scan-instruction{text-align:center;font-size:0.82rem;color:var(--text-dim);padding:0.5rem 0;line-height:1.6;margin-bottom:0.5rem;}
.scan-instruction strong{color:var(--t3);}
.scan-sentence{padding:0.75rem 1rem;background:var(--surface2);border:2px solid var(--border);border-radius:8px;margin-bottom:0.5rem;font-size:0.88rem;line-height:1.6;cursor:pointer;transition:all 0.15s;position:relative;}
.scan-sentence:hover{border-color:var(--text-muted);background:rgba(51,65,85,0.8);}
.scan-sentence.picked{border-color:var(--t3);background:rgba(245,158,11,0.08);}
.scan-sentence.correct{border-color:var(--correct);background:rgba(16,185,129,0.1);}
.scan-sentence.wrong{border-color:var(--wrong);background:rgba(239,68,68,0.06);}
.scan-sentence.missed{border-color:var(--correct);border-style:dashed;background:rgba(16,185,129,0.05);}
.scan-sentence[disabled]{pointer-events:none;opacity:0.7;}
.scan-sentence .scan-num{font-family:'JetBrains Mono',monospace;font-size:0.65rem;font-weight:700;color:var(--text-muted);margin-right:0.4rem;}
.scan-sentence .scan-check{position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);font-size:1.1rem;}
.tool-select{font-family:'DM Sans',sans-serif;font-size:0.68rem;font-weight:600;padding:0.22rem 0.4rem;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;}
.shuffle-toggle{display:flex;align-items:center;gap:0.3rem;font-size:0.65rem;color:var(--text-dim);font-weight:600;cursor:pointer;user-select:none;margin-left:auto;}
.shuffle-toggle input{accent-color:var(--t3);width:14px;height:14px;cursor:pointer;}
.diff-pill{font-family:'JetBrains Mono',monospace;font-size:0.62rem;font-weight:700;padding:0.15rem 0.45rem;border-radius:10px;margin-left:0.3rem;cursor:default;}
.diff-pill.d1{background:rgba(16,185,129,0.15);color:var(--correct);border:1px solid rgba(16,185,129,0.3);}
.diff-pill.d2{background:rgba(245,158,11,0.15);color:var(--t3);border:1px solid rgba(245,158,11,0.3);}
.diff-pill.d3{background:rgba(239,68,68,0.15);color:var(--wrong);border:1px solid rgba(239,68,68,0.3);}

/* MAIN */
.main{padding:1rem;max-width:720px;margin:0 auto;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;animation:fadeIn 0.3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;}
.card-id{font-family:'JetBrains Mono',monospace;font-size:0.68rem;color:var(--text-muted);}
.card-progress{font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:var(--text-dim);}
.phrase-block{padding:0.85rem 1rem;border-radius:8px;margin-bottom:0.75rem;font-size:0.92rem;line-height:1.55;border-left:4px solid;}
.phrase-q{background:rgba(249,115,22,0.08);border-color:var(--q-color);}
.phrase-p{background:rgba(59,130,246,0.08);border-color:var(--p-color);}
.phrase-ng{background:rgba(107,114,128,0.08);border-color:var(--ng);}
.phrase-label{font-family:'JetBrains Mono',monospace;font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.35rem;}
.phrase-label-q{color:var(--q-color);}
.phrase-label-p{color:var(--p-color);}
.phrase-label-ng{color:var(--ng);}
.answer-key{margin-top:0.5rem;padding:0.6rem 0.85rem;background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);border-radius:8px;font-size:0.85rem;}
.answer-key .ak-label{font-family:'JetBrains Mono',monospace;font-size:0.65rem;font-weight:700;color:var(--match-color);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.2rem;}
.answer-key .ak-value{font-weight:700;color:var(--text);font-size:1rem;}
.trick-explain{margin-top:0.5rem;padding:0.65rem 0.85rem;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;font-size:0.82rem;line-height:1.6;}
.trick-explain .te-name{font-weight:700;margin-bottom:0.35rem;display:flex;align-items:center;gap:0.4rem;}
.trick-explain .te-dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0;}
.trick-explain .te-mapping{color:var(--text-dim);margin-top:0.2rem;}
.trick-explain .te-q{color:var(--q-color);font-weight:600;}
.trick-explain .te-p{color:var(--p-color);font-weight:600;}
.trick-explain .te-arrow{color:var(--match-color);font-weight:700;margin:0 0.3rem;}
.trick-explain .te-why{color:var(--text-muted);font-size:0.78rem;margin-top:0.25rem;font-style:italic;}
.trick-badge{display:inline-block;font-size:0.68rem;font-weight:700;padding:0.18rem 0.55rem;border-radius:4px;color:#fff;margin:0.1rem;white-space:nowrap;}
.btn-row{display:flex;gap:0.5rem;margin-top:1rem;flex-wrap:wrap;}
.btn{font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:600;padding:0.65rem 1.25rem;border-radius:8px;border:none;cursor:pointer;transition:all 0.15s;flex:1;min-width:100px;}
.btn:disabled{opacity:0.4;cursor:not-allowed;pointer-events:none;}
.btn-primary{background:var(--t3);color:#000;}
.btn-primary:hover{filter:brightness(1.1);}
.btn-correct{background:var(--correct);color:#fff;}
.btn-wrong{background:var(--wrong);color:#fff;}
.btn-ng-action{background:var(--ng);color:#fff;}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text-dim);}
.btn-outline:hover{border-color:var(--text-muted);color:var(--text);}
.btn-trick{font-size:0.78rem;font-weight:700;padding:0.55rem 0.5rem;border-radius:8px;border:2px solid var(--border);background:transparent;color:var(--text);cursor:pointer;transition:all 0.15s;text-align:center;line-height:1.3;}
.btn-trick:hover{transform:translateY(-1px);}
.btn-trick:disabled{opacity:0.4;transform:none;cursor:not-allowed;}
.trick-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.4rem;}
.trick-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.35rem;}
.btn-trick .bt-name{font-size:0.68rem;font-weight:500;color:var(--text-dim);display:block;margin-top:0.1rem;}
.feedback{padding:0.85rem 1rem;border-radius:8px;margin-top:0.75rem;font-size:0.85rem;line-height:1.5;animation:fadeIn 0.25s ease;}
.feedback-correct{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);color:#6EE7B7;}
.feedback-wrong{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#FCA5A5;}
.prompt-text{text-align:center;margin:1rem 0;font-size:0.92rem;font-weight:600;color:var(--text-dim);}
.timer-bar{background:var(--surface2);border-radius:4px;height:6px;margin-bottom:0.75rem;overflow:hidden;}
.timer-fill{height:100%;background:var(--t3);transition:width 0.1s linear;border-radius:4px;}
.timer-fill.danger{background:var(--wrong);}
.score-card{text-align:center;padding:2rem;}
.score-big{font-family:'DM Serif Display',serif;font-size:3rem;}
.score-label{font-size:0.85rem;color:var(--text-dim);margin-top:0.25rem;}
.score-breakdown{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.75rem;margin-top:1.5rem;}
.score-stat{background:var(--surface2);padding:0.75rem;border-radius:8px;}
.score-stat-val{font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:700;}
.score-stat-label{font-size:0.7rem;color:var(--text-muted);margin-top:0.15rem;}

/* LOGIN */
.login-screen{text-align:center;padding:2.5rem 1rem;max-width:420px;margin:0 auto;}
.login-screen h2{font-family:'DM Serif Display',serif;font-size:1.6rem;margin-bottom:0.5rem;}
.login-screen p{color:var(--text-dim);font-size:0.85rem;line-height:1.5;margin-bottom:1.5rem;}
.login-field{margin-bottom:0.75rem;text-align:left;}
.login-field label{display:block;font-size:0.75rem;font-weight:600;color:var(--text-dim);margin-bottom:0.3rem;}
.login-field input,.login-field select{width:100%;font-family:'DM Sans',sans-serif;font-size:0.9rem;padding:0.6rem 0.75rem;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);}
.login-field input:focus,.login-field select:focus{border-color:var(--t3);outline:none;}
.login-row{display:flex;gap:0.5rem;}
.login-row .login-field{flex:1;}
.login-hint{font-size:0.7rem;color:var(--text-muted);margin-top:0.5rem;}
.login-welcome{font-size:0.88rem;color:var(--text-dim);margin-bottom:1rem;padding:0.75rem;background:var(--surface2);border-radius:8px;}
.login-welcome strong{color:var(--text);}

/* WELCOME */
.welcome{text-align:center;padding:1.5rem 1rem;}
.welcome h2{font-family:'DM Serif Display',serif;font-size:1.4rem;margin-bottom:0.5rem;}
.welcome p{color:var(--text-dim);font-size:0.85rem;line-height:1.6;margin-bottom:1.25rem;max-width:500px;margin-left:auto;margin-right:auto;}
.mode-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:0.75rem;cursor:pointer;transition:all 0.2s;text-align:left;}
.mode-card:hover{border-color:var(--t3);transform:translateY(-2px);}
.mode-card h3{font-size:0.95rem;margin-bottom:0.25rem;}
.mode-card p{font-size:0.78rem;color:var(--text-muted);margin:0;}
.weak-suggest{margin-bottom:1.25rem;padding:0.75rem 1rem;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:8px;font-size:0.82rem;text-align:left;}
.weak-suggest strong{color:var(--wrong);}

@media(max-width:500px){.mode-tabs{gap:0.2rem;padding:0.4rem;}.mode-tab{font-size:0.62rem;padding:0.3rem 0.5rem;}.main{padding:0.75rem;}.card{padding:1rem;}.phrase-block{font-size:0.85rem;padding:0.7rem 0.85rem;}.btn{font-size:0.8rem;padding:0.55rem 0.75rem;}.trick-grid{grid-template-columns:1fr;}.mastery-item{min-width:50px;font-size:0.58rem;}.mastery-item .mi-pct{font-size:0.68rem;}.ev-tok{font-size:0.8rem;padding:0.15rem 0.28rem;}.ev-word-area{padding:0.5rem;}.ev-instructions{font-size:0.72rem;}.mode-tab{font-size:0.58rem;padding:0.28rem 0.4rem;}}
</style>
</head>
<body>
<header class="app-header"><h1 class="app-title">IELTS Paraphrase Trainer</h1><p class="app-subtitle">1,211 Real Cambridge Pairs &middot; 6 Tricks &middot; Books 8–16</p></header>
<div class="mastery-bar" id="masteryBar" style="display:none;" role="status" aria-live="polite" aria-label="Trick mastery"></div>
<span id="statTotal" style="display:none;">0</span>

hecked> Shuffle</label></div>

<script>
var ALL_PAIRS = [];
var ALL_NG = [];
var DATA_LOADED = false;
</script>
<script type="module">

/* ============================================================
   TRICK DEFINITIONS
   ============================================================ */
const TRICKS = {
  T1: { name:"Word Family", color:"var(--t1)", dark:false,
    desc:"The question and passage use the same root word in a different grammatical form (e.g. noun becomes verb, adjective becomes adverb)." },
  T2: { name:"Synonym Swap", color:"var(--t2)", dark:false,
    desc:"The question and passage use completely different words that mean the same thing." },
  T3: { name:"Phrase Swap", color:"var(--t3)", dark:true,
    desc:"A whole phrase in the question is replaced with a different phrase that carries the same meaning." },
  T4: { name:"General / Specific", color:"var(--t4)", dark:false,
    desc:"The question uses a general category word, while the passage gives a specific example (or vice versa)." },
  T5: { name:"Structure Flip", color:"var(--t5)", dark:false,
    desc:"The same fact is expressed using completely different grammar (e.g. verb phrase becomes noun, active becomes passive)." },
  T6: { name:"Opposite + Negative", color:"var(--t6)", dark:false,
    desc:"The meaning is flipped to its opposite and a negative word is added, so the overall meaning stays the same." }
};
const TRICK_KEYS = ['T1','T2','T3','T4','T5','T6'];
const QT_NAMES = {TFN:'T/F/NG',YNN:'Y/N/NG',completion:'Completion',matching_info:'Match Info',matching_headings:'Headings',matching_features:'Match Features',matching_endings:'Endings',mcq:'MCQ',mcq_two:'MCQ (2)',classify:'Classify',summary_completion:'Summary'};

/* ============================================================
   UTILITIES
   ============================================================ */
function escapeHTML(str) {
  if (typeof str !== 'string') return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function buildBadge(trickKey) {
  const trick = TRICKS[trickKey];
  if (!trick) return '<span class="trick-badge" style="background:var(--text-muted);">' + trickKey + '</span>';
  return '<span class="trick-badge" style="background:' + trick.color + ';' + (trick.dark ? 'color:#000;' : '') + '">' + escapeHTML(trick.name) + '</span>';
}

function parseTrickDetail(detailStr) {
  const trickMatch = detailStr.match(/\(([^)]+)\)\s*$/);
  const trickKey = trickMatch ? trickMatch[1] : '';
  const mapping = detailStr.replace(/\([^)]*\)\s*$/, '').trim();
  const parts = mapping.split(/\s*(?:\u2192|->)\s*/);
  return { questionWord: parts[0] || '', passageWord: parts[1] || '', trickKey };
}

function buildTrickExplanation(detailStr) {
  const info = parseTrickDetail(detailStr);
  const trick = TRICKS[info.trickKey];
  if (!trick) {
    return '<div class="trick-explain"><div class="te-name"><span class="te-dot" style="background:var(--text-muted);"></span> Direct Match</div><div class="te-mapping"><span class="te-q">\u201c' + escapeHTML(info.questionWord) + '\u201d</span><span class="te-arrow">=</span><span class="te-p">\u201c' + escapeHTML(info.passageWord) + '\u201d</span></div><div class="te-why">These words are identical \u2014 no paraphrase trick used here.</div></div>';
  }
  return '<div class="trick-explain"><div class="te-name"><span class="te-dot" style="background:' + trick.color + ';"></span> ' + escapeHTML(trick.name) + '</div><div class="te-mapping"><span class="te-q">\u201c' + escapeHTML(info.questionWord) + '\u201d</span><span class="te-arrow">\u2192</span><span class="te-p">\u201c' + escapeHTML(info.passageWord) + '\u201d</span></div><div class="te-why">' + escapeHTML(trick.desc) + '</div></div>';
}

function buildPhraseBlock(type, label, text) {
  const blockClass = type === 'q' ? 'phrase-q' : type === 'p' ? 'phrase-p' : 'phrase-ng';
  const labelClass = type === 'q' ? 'phrase-label-q' : type === 'p' ? 'phrase-label-p' : 'phrase-label-ng';
  return '<div class="phrase-block ' + blockClass + '"><div class="phrase-label ' + labelClass + '">' + escapeHTML(label) + '</div>' + escapeHTML(text) + '</div>';
}

function buildAnswerKey(answer) {
  if (!answer) return '';
  const isVerdict = ['TRUE','FALSE','NOT GIVEN','YES','NO'].includes(answer);
  return '<div class="answer-key"><div class="ak-label">' + (isVerdict ? 'Answer:' : 'Answer Key:') + '</div><div class="ak-value">' + escapeHTML(answer) + '</div></div>';
}

function buildCardHeader(id, book, index, total, qt) {
  const qtBadge = qt && QT_NAMES[qt] ? '<span class="qt-badge">' + escapeHTML(QT_NAMES[qt]) + '</span>' : '';
  const reviewBadge = state.isReviewPair ? '<span class="review-badge">&#128257; REVIEW</span>' : '';
  return '<div class="card-header"><span class="card-id">' + escapeHTML(id) + ' &middot; Book ' + escapeHTML(book) + qtBadge + reviewBadge + '</span><span class="card-progress">' + (index + 1) + ' / ' + total + '</span></div>';
}

/* ============================================================
   SAME-PASSAGE MISMATCH (FIX for Recognise mode)
   Get a passage phrase from a DIFFERENT question in the SAME passage
   ============================================================ */
function getSamePassageMismatch(currentPair, allPairs) {
  // Find pairs from the same passage (same pid) but different question
  const samePassage = allPairs.filter(p => p.pid === currentPair.pid && p.id !== currentPair.id);
  if (samePassage.length > 0) {
    // Pick a random one from the same passage
    return samePassage[Math.floor(Math.random() * samePassage.length)].p;
  }
  // Fallback: different passage but same book
  const sameBook = allPairs.filter(p => p.book === currentPair.book && p.id !== currentPair.id);
  if (sameBook.length > 0) {
    return sameBook[Math.floor(Math.random() * sameBook.length)].p;
  }
  // Last resort: any different pair
  const idx = Math.floor(Math.random() * allPairs.length);
  return allPairs[idx].p;
}

/* ============================================================
   PERSISTENCE (localStorage)
   ============================================================ */
const STORAGE_PREFIX = 'ielts_para_';

function loadUserData(userId) {
  try {
    const raw = localStorage.getItem(STORAGE_PREFIX + userId);
    if (raw) return JSON.parse(raw);
  } catch (e) { /* ignore */ }
  return null;
}

function saveUserData(userId, data) {
  try {
    localStorage.setItem(STORAGE_PREFIX + userId, JSON.stringify(data));
  } catch (e) { /* ignore */ }
}

function createFreshStats() {
  const trickStats = {};
  TRICK_KEYS.forEach(k => { trickStats[k] = { correct: 0, total: 0 }; });
  return { trickStats, totalCorrect: 0, totalAttempted: 0, lastDate: null, sessions: 0, maxDifficulty: 1, diffStats: { 1: { correct: 0, total: 0 }, 2: { correct: 0, total: 0 }, 3: { correct: 0, total: 0 } }, pairHistory: {} };
}

/* ============================================================
   STATE
   ============================================================ */
const state = {
  screen: 'login',
  userId: null,
  userData: null,
  filter: 'all',
  book: 'all',
  qtFilter: 'all',
  shuffleOn: true,
  pairs: [],
  currentIndex: 0,
  answered: false,
  locked: false,
  lastAnswer: null,
  sessionStreak: 0,
  // Recognise mode
  currentIsReal: true,
  currentFakePassage: '',
  evidenceStep: false,
  evidenceText: '',
  isReviewPair: false,
  // Timer
  timerInterval: null,
  timeLeft: 0,
  // Speed
  speedDone: undefined,
  speedCorrect: 0,
  // NG
  ngItems: null,
  ngIndex: 0,
  // Evidence Match
  evConnections: [],   // [{qIdxs:[], pIdxs:[]}]
  evSelectingQ: true,  // true = selecting Q words, false = selecting P words
  evTempQ: [],         // temp Q word indices for current connection
  evTempP: [],         // temp P word indices for current connection
  evSubmitted: false,
  // Scanning
  scanSentences: [],
  scanCorrectIdx: -1,
  scanPicked: -1,
  scanSubmitted: false
};

/* ============================================================
   FILTERING
   ============================================================ */
function getFilteredPairs() {
  let pairs = [...ALL_PAIRS];
  if (state.book !== 'all') pairs = pairs.filter(p => p.book === state.book);
  if (state.filter === 'combo') pairs = pairs.filter(p => p.t.length > 1);
  else if (state.filter !== 'all') pairs = pairs.filter(p => p.t.includes(state.filter));
  if (state.qtFilter !== 'all') pairs = pairs.filter(p => p.qt === state.qtFilter);
  // Difficulty progression: only show pairs at or below unlocked level
  if (state.userData && state.userData.maxDifficulty) {
    pairs = pairs.filter(p => p.d <= state.userData.maxDifficulty);
  }
  return pairs;
}

function getFilteredNG() {
  let items = [...ALL_NG];
  if (state.book !== 'all') items = items.filter(n => n.book === state.book);
  return items;
}

function applyFilters() {
  let pairs = getFilteredPairs();
  if (state.shuffleOn) shuffleArray(pairs);
  state.pairs = pairs;
  state.currentIndex = 0;
  state.answered = false;
  state.locked = false;
  prepareRecogniseItem();
  if (state.screen === 'scanning') prepareScanItem();
  document.getElementById('statTotal').textContent = pairs.length;
  updateFilterCounts();
}

function updateFilterCounts() {
  if (!DATA_LOADED) return;
  let pool = [...ALL_PAIRS];
  if (state.book !== 'all') pool = pool.filter(p => p.book === state.book);
  const counts = {all: pool.length, combo: pool.filter(p => p.t.length > 1).length};
  TRICK_KEYS.forEach(tk => { counts[tk] = pool.filter(p => p.t.includes(tk)).length; });
  document.querySelectorAll('.tool-btn[data-action="filter"]').forEach(btn => {
    const t = btn.dataset.t;
    const countEl = btn.querySelector('.filter-count');
    const c = counts[t] !== undefined ? counts[t] : 0;
    if (countEl) { countEl.textContent = '(' + c + ')'; }
    else { btn.insertAdjacentHTML('beforeend', '<span class="filter-count">(' + c + ')</span>'); }
  });
}

/* Pre-decide whether current Recognise item is real or fake */
function prepareRecogniseItem() {
  if (!state.pairs.length) return;
  const pair = state.pairs[state.currentIndex];
  // ~65% real matches, ~35% fakes (enough fakes to keep them honest)
  state.currentIsReal = Math.random() > 0.35;
  if (!state.currentIsReal) {
    state.currentFakePassage = getSamePassageMismatch(pair, state.pairs);
  }
}

/* ============================================================
   SCORING
   ============================================================ */
function getScorableTricks(trickKeys) {
  // When filtering by a specific trick, only score that trick
  if (state.filter !== 'all' && state.filter !== 'combo' && TRICK_KEYS.includes(state.filter)) {
    return trickKeys.filter(k => k === state.filter);
  }
  return trickKeys;
}

function recordCorrect(trickKeys) {
  if (!state.userData) return;
  const scorable = getScorableTricks(trickKeys);
  state.userData.totalCorrect++;
  state.userData.totalAttempted++;
  state.sessionStreak++;
  scorable.forEach(k => {
    if (state.userData.trickStats[k]) {
      state.userData.trickStats[k].correct++;
      state.userData.trickStats[k].total++;
    }
  });
  // Track difficulty stats
  const pair = state.pairs[state.currentIndex];
  if (pair) {
    trackDifficulty(pair.d, true);
    trackPairResult(pair.id, true);
    logEvent('answer', { pairId: pair.id, mode: state.screen, correct: true, tricks: pair.t, d: pair.d, qt: pair.qt });
  }
  saveUserData(state.userId, state.userData);
}

function recordWrong(trickKeys) {
  if (!state.userData) return;
  const scorable = getScorableTricks(trickKeys);
  state.userData.totalAttempted++;
  state.sessionStreak = 0;
  scorable.forEach(k => {
    if (state.userData.trickStats[k]) {
      state.userData.trickStats[k].total++;
    }
  });
  const pair = state.pairs[state.currentIndex];
  if (pair) {
    trackDifficulty(pair.d, false);
    trackPairResult(pair.id, false);
    logEvent('answer', { pairId: pair.id, mode: state.screen, correct: false, tricks: pair.t, d: pair.d, qt: pair.qt });
  }
  saveUserData(state.userId, state.userData);
}

function trackDifficulty(d, isCorrect) {
  if (!state.userData) return;
  if (!state.userData.diffStats) state.userData.diffStats = { 1: { correct: 0, total: 0 }, 2: { correct: 0, total: 0 }, 3: { correct: 0, total: 0 } };
  if (!state.userData.maxDifficulty) state.userData.maxDifficulty = 1;
  const ds = state.userData.diffStats[d];
  if (ds) {
    if (isCorrect) ds.correct++;
    ds.total++;
  }
  // Check unlock: 70% accuracy with at least 10 attempts on current max level
  const maxD = state.userData.maxDifficulty;
  if (maxD < 3) {
    const stats = state.userData.diffStats[maxD];
    if (stats && stats.total >= 10 && (stats.correct / stats.total) >= 0.7) {
      state.userData.maxDifficulty = maxD + 1;
    }
  }
}

/* ============================================================
   SPACED REPETITION (6a)
   Tracks per-pair results. Failed pairs resurface more often.
   A pair "graduates" after 2 consecutive correct answers.
   ============================================================ */
function trackPairResult(pairId, isCorrect) {
  if (!state.userData) return;
  if (!state.userData.pairHistory) state.userData.pairHistory = {};
  const ph = state.userData.pairHistory;
  if (!ph[pairId]) ph[pairId] = { w: 0, streak: 0, last: 0 };
  const entry = ph[pairId];
  entry.last = Date.now();
  if (isCorrect) {
    entry.streak++;
    // Graduate: 2 correct in a row clears review status
    if (entry.streak >= 2 && entry.w > 0) {
      entry.w = 0;
      entry.streak = 0;
    }
  } else {
    entry.w++;
    entry.streak = 0;
  }
  // Prune old graduated entries to keep storage lean
  const keys = Object.keys(ph);
  if (keys.length > 500) {
    const graduated = keys.filter(k => ph[k].w === 0 && ph[k].streak >= 2);
    graduated.slice(0, graduated.length - 100).forEach(k => delete ph[k]);
  }
}

function getReviewQueue(filteredPairs) {
  if (!state.userData || !state.userData.pairHistory) return [];
  const ph = state.userData.pairHistory;
  const now = Date.now();
  const reviewable = filteredPairs.filter(p => {
    const entry = ph[p.id];
    if (!entry || entry.w === 0) return false;
    // Don't review if answered correctly in last 60 seconds (avoid immediate repeat)
    if (entry.last && (now - entry.last) < 60000) return false;
    return true;
  });
  // Sort by: highest wrong count first, then most recent mistake first
  reviewable.sort((a, b) => {
    const ea = ph[a.id], eb = ph[b.id];
    if (eb.w !== ea.w) return eb.w - ea.w;
    return eb.last - ea.last;
  });
  return reviewable;
}

function pickNextPair() {
  /* Returns the index in state.pairs to show next, weaving in review pairs.
     30% chance of review pair if any exist. */
  const reviewQueue = getReviewQueue(state.pairs);
  const REVIEW_CHANCE = 0.3;
  if (reviewQueue.length > 0 && Math.random() < REVIEW_CHANCE) {
    // Pick from review queue (first = highest priority)
    const reviewPair = reviewQueue[0];
    const idx = state.pairs.findIndex(p => p.id === reviewPair.id);
    if (idx >= 0) {
      state.isReviewPair = true;
      return idx;
    }
  }
  // Normal progression
  state.isReviewPair = false;
  let next = state.currentIndex + 1;
  if (next >= state.pairs.length) {
    next = 0;
    if (state.shuffleOn) shuffleArray(state.pairs);
  }
  return next;
}

function getWeakestTrick() {
  if (!state.userData) return null;
  let weakest = null;
  let lowestPct = 101;
  TRICK_KEYS.forEach(k => {
    const s = state.userData.trickStats[k];
    if (s.total >= 3) {
      const pct = Math.round(100 * s.correct / s.total);
      if (pct < lowestPct) { lowestPct = pct; weakest = k; }
    }
  });
  return weakest && lowestPct < 70 ? { trick: weakest, pct: lowestPct } : null;
}

/* ============================================================
   MASTERY BAR
   ============================================================ */
function updateMasteryBar() {
  const bar = document.getElementById('masteryBar');
  if (!bar || !state.userData) return;
  let html = '';
  TRICK_KEYS.forEach(k => {
    const s = state.userData.trickStats[k];
    const trick = TRICKS[k];
    const pct = s.total > 0 ? Math.round(100 * s.correct / s.total) : 0;
    const cls = s.total >= 3 ? (pct >= 70 ? 'strong' : pct < 50 ? 'weak' : '') : '';
    html += '<div class="mastery-item ' + cls + '"><div class="mi-name" style="color:' + trick.color + ';">' + escapeHTML(trick.name) + '</div><div class="mi-pct">' + (s.total > 0 ? pct + '%' : '\u2014') + '</div><div class="mi-count">' + s.correct + '/' + s.total + '</div></div>';
  });
  html += '<span class="streak-pill">Streak: <span class="val">' + state.sessionStreak + '</span></span>';
  bar.innerHTML = html;
  // Update difficulty pill
  updateDiffPill();
}

function updateDiffPill() {
  const pill = document.getElementById('diffPill');
  if (!pill || !state.userData) return;
  if (!state.userData.maxDifficulty) state.userData.maxDifficulty = 1;
  if (!state.userData.diffStats) state.userData.diffStats = { 1: { correct: 0, total: 0 }, 2: { correct: 0, total: 0 }, 3: { correct: 0, total: 0 } };
  const d = state.userData.maxDifficulty;
  const ds = state.userData.diffStats[d];
  const pct = ds && ds.total > 0 ? Math.round(100 * ds.correct / ds.total) : 0;
  const progress = ds ? ds.total : 0;
  let label = 'd=' + d;
  if (d < 3 && progress > 0) label += ' (' + pct + '% of 70)';
  if (d < 3) label += ' \u2014 ' + (d + 1) + ' locked';
  pill.className = 'diff-pill d' + d;
  pill.textContent = label;
  pill.title = 'Difficulty level ' + d + '/3.' + (d < 3 ? ' Get 70% accuracy on 10+ questions at d=' + d + ' to unlock d=' + (d + 1) + '.' : ' All difficulties unlocked!');
}

/* ============================================================
   MODE SWITCHING
   ============================================================ */
function switchMode(mode) {
  state.screen = mode;
  state.answered = false;
  state.locked = false;
  clearTimer();
  if (mode === 'notgiven') { state.ngItems = null; state.ngIndex = 0; }
  if (mode === 'speed') { state.speedDone = undefined; }
  if (mode === 'evidence') { state.evConnections = []; state.evTempQ = []; state.evTempP = []; state.evSelectingQ = true; state.evSubmitted = false; }
  if (mode === 'scanning') { prepareScanItem(); }
  document.querySelectorAll('.mode-tab').forEach(t => t.setAttribute('aria-selected', t.dataset.mode === mode ? 'true' : 'false'));
  document.getElementById('toolbar').style.display = mode === 'welcome' || mode === 'login' ? 'none' : '';
  document.getElementById('masteryBar').style.display = mode === 'login' ? 'none' : '';
  applyFilters();
  render();
}

function nextPair() {
  state.answered = false;
  state.locked = false;
  state.evidenceStep = false;
  state.evidenceText = undefined;
  state.currentIndex = pickNextPair();
  prepareRecogniseItem();
  render();
}

function setFilter(filter) {
  state.filter = filter;
  document.querySelectorAll('.tool-btn[data-action="filter"]').forEach(b => b.setAttribute('aria-pressed', b.dataset.t === filter ? 'true' : 'false'));
  applyFilters();
  if (state.screen === 'notgiven') { state.ngItems = null; state.ngIndex = 0; }
  render();
}

function setBook(book) {
  state.book = book;
  applyFilters();
  if (state.screen === 'notgiven') { state.ngItems = null; state.ngIndex = 0; }
  render();
}

/* ============================================================
   TIMER
   ============================================================ */
function clearTimer() { if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; } }
function startTimer() {
  clearTimer(); state.timeLeft = 150;
  state.timerInterval = setInterval(() => {
    state.timeLeft--;
    if (state.timeLeft <= 0) { clearTimer(); state.speedDone++; const p = state.pairs[state.currentIndex]; if (p) recordWrong(p.t); if (state.speedDone < 10) { state.currentIndex = (state.currentIndex + 1) % state.pairs.length; state.answered = false; state.locked = false; startTimer(); } render(); updateMasteryBar(); }
    else { const b = document.querySelector('.timer-fill'), e = document.getElementById('speedTimer'); if (b) { const pct = (state.timeLeft / 150) * 100; b.style.width = pct + '%'; if (pct < 30) b.classList.add('danger'); } if (e) e.textContent = Math.ceil(state.timeLeft / 10) + 's'; }
  }, 100);
}

/* ============================================================
   ANSWER HANDLERS
   ============================================================ */
function answerRecognise(userSaidYes) {
  if (state.locked) return;
  state.lastAnswer = { userSaidYes, isRealMatch: state.currentIsReal };
  // If user said YES and it IS a real match → go to evidence step first
  if (userSaidYes && state.currentIsReal) {
    state.evidenceStep = true;
    state.evidenceText = '';
    render();
    const inp = document.getElementById('evidenceInput');
    if (inp) inp.focus();
    return;
  }
  // All other cases: score and show feedback immediately
  state.locked = true; state.answered = true;
  if (userSaidYes === state.currentIsReal) recordCorrect(state.currentIsReal ? state.pairs[state.currentIndex].t : []);
  else recordWrong(state.currentIsReal ? state.pairs[state.currentIndex].t : []);
  render(); updateMasteryBar();
}

function parseTdEntry(td) {
  const m = td.match(/^(.+?)\s*→\s*(.+?)\s*\(T\d\)$/);
  if (!m) return null;
  return { q: m[1].trim().toLowerCase(), p: m[2].trim().toLowerCase() };
}

function scoreEvidence(userText, tdEntries) {
  if (!userText.trim()) return { matched: [], missed: tdEntries.map(td => td), score: 0 };
  const input = userText.toLowerCase().replace(/[=→\->]+/g, ' ').replace(/[^\w\s]/g, ' ');
  const inputWords = input.split(/\s+/).filter(w => w.length > 2);
  const matched = [];
  const missed = [];
  for (const td of tdEntries) {
    const parsed = parseTdEntry(td);
    if (!parsed) { missed.push(td); continue; }
    const qWords = parsed.q.split(/\s+/).filter(w => w.length > 2);
    const pWords = parsed.p.split(/\s+/).filter(w => w.length > 2);
    const hitQ = qWords.some(w => inputWords.some(iw => iw === w || iw.includes(w) || w.includes(iw)));
    const hitP = pWords.some(w => inputWords.some(iw => iw === w || iw.includes(w) || w.includes(iw)));
    if (hitQ || hitP) matched.push(td);
    else missed.push(td);
  }
  return { matched, missed, score: matched.length };
}

function submitEvidence() {
  const inp = document.getElementById('evidenceInput');
  state.evidenceText = inp ? inp.value : '';
  state.evidenceStep = false;
  state.locked = true;
  state.answered = true;
  // Always correct since they already said YES on a real match
  recordCorrect(state.pairs[state.currentIndex].t);
  render(); updateMasteryBar();
}

function answerClassify(trickKey) {
  if (state.locked) return;
  state.locked = true; state.answered = true; state.lastAnswer = trickKey;
  record(state.pairs[state.currentIndex].t.includes(trickKey), state.pairs[state.currentIndex].t);
  render(); updateMasteryBar();
}

function record(isCorrect, trickKeys) {
  if (isCorrect) recordCorrect(trickKeys);
  else recordWrong(trickKeys);
}

function answerNotGiven(userSaidNG) {
  if (state.locked) return;
  state.locked = true; state.answered = true; state.lastAnswer = userSaidNG;
  const item = state.ngItems[state.ngIndex];
  record(userSaidNG === item.isNG, item.isNG ? [] : (item.t || []));
  render(); updateMasteryBar();
}

function answerSpeed(trickKey) {
  if (state.locked) return;
  state.locked = true; state.answered = true; state.lastAnswer = trickKey; clearTimer();
  const pair = state.pairs[state.currentIndex];
  const isCorrect = pair.t.includes(trickKey);
  state.speedDone++; if (isCorrect) state.speedCorrect++;
  record(isCorrect, pair.t);
  render(); updateMasteryBar();
  setTimeout(() => { if (state.speedDone < 10) { state.currentIndex = (state.currentIndex + 1) % state.pairs.length; state.answered = false; state.locked = false; startTimer(); render(); } else { state.locked = false; render(); } }, 1200);
}

function startSpeedRound() {
  state.speedDone = 0; state.speedCorrect = 0; state.currentIndex = 0; state.answered = false; state.locked = false;
  if (state.shuffleOn) shuffleArray(state.pairs); startTimer(); render();
}

      : '<strong>&#10007; Not quite.</strong> ' + (state.lastAnswer.isRealMatch ? 'These ARE actually a match. The words differ but the meaning is the same.' : 'These are NOT a real match \u2014 this passage sentence is about the same topic but answers a different question.');

      // Show evidence scoring if student typed something

function renderClassify() {
  if (!state.pairs.length) return '<div class="card"><p>No pairs match this filter.</p></div>';
  const pair = state.pairs[state.currentIndex];

  let body = '<div class="card">' + buildCardHeader(pair.id, pair.book, state.currentIndex, state.pairs.length, pair.qt) +

      ? '<strong>&#10003; Correct!</strong> ' + buildBadge(state.lastAnswer) + '<br><span style="font-size:0.8rem;color:var(--text-muted);">' + escapeHTML(answeredTrick.desc) + '</span>' + (pair.t.length > 1 ? '<br><br>This pair also uses: ' + pair.t.filter(t => t !== state.lastAnswer).map(t => buildBadge(t)).join(' ') : '')
      : '<strong>&#10007; Not quite.</strong> The primary trick is ' + buildBadge(primaryTrick) + '<br><span style="font-size:0.8rem;">' + escapeHTML(TRICKS[primaryTrick].desc) + '</span>' + (pair.t.length > 1 ? '<br><br>All tricks: ' + pair.t.map(t => buildBadge(t)).join(' ') : '');
    msg += '<br><br>' + buildAnswerKey(pair.a);
    msg += '<div style="margin-top:0.5rem;">' + pair.td.map(td => buildTrickExplanation(td)).join('') + '</div>';
    body += '<div class="feedback ' + (correct ? 'feedback-correct' : 'feedback-wrong') + '">' + msg + '</div>';
    body += '<div class="btn-row"><button class="btn btn-primary" data-action="next">Next &rarr;</button></div>';
  } else {
    body += '<div class="trick-grid">';

    }
    body += '</div>';
  }
  return body + '</div>';

/* NOT GIVEN MODE — FIX: Show actual trap passage sentences */
function renderNotGiven() {
  if (!state.ngItems) {
    const items = [];
    /* NG items now show the TRAP passage sentence — the sentence students confuse with a match */
    getFilteredNG().forEach(n => {
      items.push({ id: n.id, q: n.q, p: n.trap_passage || '', trap: n.trap, isNG: true });
    });
    /* Real match items — show actual passage */
    const realPool = getFilteredPairs().filter(p => p.qt === 'TFN' || p.qt === 'YNN');
    realPool.slice(0, Math.max(20, realPool.length)).forEach(r => {
      items.push({ id: r.id, q: r.q, p: r.p, t: r.t, td: r.td, a: r.a, isNG: false });
    });
    shuffleArray(items); state.ngItems = items; state.ngIndex = 0;
  }

  if (state.ngIndex >= state.ngItems.length) {
    return '<div class="card score-card"><div class="score-big" style="color:var(--match-color);">Complete!</div><div class="score-label">NOT GIVEN Training finished</div><div class="btn-row" style="justify-content:center;margin-top:1.5rem;"><button class="btn btn-primary" data-action="restart-ng">Restart</button></div></div>';
  }

  const item = state.ngItems[state.ngIndex];

  /* KEY FIX: Both NG and real items show a passage sentence.
     For NG items, the passage sentence is the TRAP — it looks related but doesn't actually answer the question.
     Students must discover the gap themselves. */
  let body = '<div class="card"><div class="card-header"><span class="card-id">' + escapeHTML(item.id) + '</span><span class="card-progress">' + (state.ngIndex + 1) + ' / ' + state.ngItems.length + '</span></div>' +
    buildPhraseBlock('q', 'Question says:', item.q) +
    buildPhraseBlock('p', 'Passage says:', item.p) +
    '<div class="prompt-text">Does the passage <span style="color:var(--match-color)">ACTUALLY ANSWER</span> what the question asks?</div>';

  if (state.answered) {
    const correct = state.lastAnswer === item.isNG;
    let msg;
    if (correct && item.isNG) {
      msg = '<strong>&#10003; Correct! This is NOT GIVEN.</strong><br><br><div style="font-size:0.82rem;color:var(--text-dim);line-height:1.5;">' + escapeHTML(item.trap) + '</div>';
    } else if (correct && !item.isNG) {
      msg = '<strong>&#10003; Correct! This IS a real match.</strong>';
      if (item.td) msg += '<div style="margin-top:0.5rem;">' + (item.t || []).map(t => buildBadge(t)).join(' ') + '</div>' + (item.td || []).map(td => buildTrickExplanation(td)).join('');
    } else if (!correct && item.isNG) {
      msg = '<strong>&#10007; Actually, this is NOT GIVEN.</strong> The passage sentence looks related, but it does NOT answer what the question specifically asks.<br><br><div style="font-size:0.82rem;color:var(--text-dim);line-height:1.5;">' + escapeHTML(item.trap) + '</div>';
    } else {
      msg = '<strong>&#10007; Actually, this IS a real match.</strong> The words are different but the meaning is the same.';
      if (item.td) msg += '<div style="margin-top:0.5rem;">' + (item.t || []).map(t => buildBadge(t)).join(' ') + '</div>' + (item.td || []).map(td => buildTrickExplanation(td)).join('');
    }
    body += '<div class="feedback ' + (correct ? 'feedback-correct' : 'feedback-wrong') + '">' + msg + '</div>';
    body += '<div class="btn-row"><button class="btn btn-primary" data-action="advance-ng">Next &rarr;</button></div>';
  } else {
    body += '<div class="btn-row"><button class="btn btn-correct" data-action="ng-real" style="font-size:0.95rem;">&#10003; YES &mdash; It answers the question</button><button class="btn btn-ng-action" data-action="ng-notgiven" style="font-size:0.95rem;">&#10007; NO &mdash; NOT GIVEN</button></div>';
  }
  return body + '</div>';
}

function tokenize(text) {
  // Split into words, keeping punctuation attached for display but separate for matching
  return text.split(/(\s+)/).filter(t => t.trim()).map((w, i) => ({ word: w, idx: i }));
}

function renderEvidence() {
  if (!state.pairs.length) return '<div class="card"><p>No pairs match this filter. Try changing the book or trick filter.</p></div>';
  const pair = state.pairs[state.currentIndex];
  const qTokens = tokenize(pair.q);
  const pTokens = tokenize(pair.p);

  let body = '<div class="card">' + buildCardHeader(pair.id, pair.book, state.currentIndex, state.pairs.length, pair.qt);

  if (state.evSubmitted) {
    // SUBMITTED — show results
    const result = validateEvConnections(pair, qTokens, pTokens);
    let msg = '';
    if (result.matchedCount === pair.td.length) {
      msg = '<strong style="color:var(--correct);">&#10003; Perfect! You found all ' + pair.td.length + ' paraphrase connection' + (pair.td.length > 1 ? 's' : '') + '!</strong>';
    } else if (result.matchedCount > 0) {
      msg = '<strong style="color:var(--t3);">You found ' + result.matchedCount + ' of ' + pair.td.length + ' connection' + (pair.td.length > 1 ? 's' : '') + '.</strong>';
    } else {
      msg = '<strong style="color:var(--wrong);">No matches found.</strong> Study the connections below.';
    }

    // Show Q tokens with result highlights
    body += '<div class="ev-word-area"><span class="ev-label ev-label-q">Question:</span><div class="ev-tokens">';
    qTokens.forEach((tok, i) => {
      let cls = 'ev-tok';
      let badge = '';
      const conn = result.tokenResults.qHit[i];
      const miss = result.tokenResults.qMiss[i];
      if (conn !== undefined) { cls += ' matched-q'; badge = '<span class="ev-conn-badge ev-conn-badge-ok">' + (conn + 1) + '</span>'; }
      else if (miss !== undefined) { cls += ' missed-q'; badge = '<span class="ev-conn-badge ev-conn-badge-miss">!</span>'; }
      body += '<span class="' + cls + '">' + escapeHTML(tok.word) + badge + '</span>';
    });
    body += '</div></div>';

    body += '<div class="ev-word-area"><span class="ev-label ev-label-p">Passage:</span><div class="ev-tokens">';
    pTokens.forEach((tok, i) => {
      let cls = 'ev-tok';
      let badge = '';
      const conn = result.tokenResults.pHit[i];
      const miss = result.tokenResults.pMiss[i];
      if (conn !== undefined) { cls += ' matched-p'; badge = '<span class="ev-conn-badge ev-conn-badge-ok">' + (conn + 1) + '</span>'; }
      else if (miss !== undefined) { cls += ' missed-p'; badge = '<span class="ev-conn-badge ev-conn-badge-miss">!</span>'; }
      body += '<span class="' + cls + '">' + escapeHTML(tok.word) + badge + '</span>';
    });
    body += '</div></div>';

    body += '<div class="feedback feedback-correct" style="border-color:' + (result.matchedCount === pair.td.length ? 'var(--correct)' : 'var(--t3)') + ';">' + msg;
    body += '<br><br>' + buildAnswerKey(pair.a);
    body += '<div style="margin-top:0.5rem;">' + pair.t.map(t => buildBadge(t)).join(' ') + '</div>';
    body += pair.td.map(td => buildTrickExplanation(td)).join('');
    body += '</div>';
    body += '<div class="btn-row"><button class="btn btn-primary" data-action="next-evidence">Next &rarr;</button></div>';

  } else {
    // ACTIVE — tappable tokens
    const isQPhase = state.evSelectingQ;

    body += '<div class="ev-instructions">' +
      (isQPhase
        ? '<strong>Step 1:</strong> Tap the key word(s) in the <strong style="color:var(--q-color);">question</strong> that are paraphrased.'
        : '<strong>Step 2:</strong> Now tap the matching word(s) in the <strong style="color:var(--p-color);">passage</strong>.') +
      '</div>';

    body += '<div class="ev-step-indicator"><span class="ev-step ev-step-q' + (isQPhase ? ' active' : '') + '">Q words</span><span class="ev-step ev-step-p' + (!isQPhase ? ' active' : '') + '">P words</span></div>';

    // Q tokens
    body += '<div class="ev-word-area"><span class="ev-label ev-label-q">Question:</span><div class="ev-tokens">';
    qTokens.forEach((tok, i) => {
      let cls = 'ev-tok';
      let badge = '';
      // Check if in a completed connection
      const connIdx = state.evConnections.findIndex(c => c.qIdxs.includes(i));
      if (connIdx >= 0) { cls += ' matched-q'; badge = '<span class="ev-conn-badge ev-conn-badge-q">' + (connIdx + 1) + '</span>'; }
      else if (state.evTempQ.includes(i)) { cls += ' sel-q'; }
      const action = isQPhase ? 'data-action="ev-tap-q" data-idx="' + i + '"' : '';
      body += '<span class="' + cls + '" ' + action + '>' + escapeHTML(tok.word) + badge + '</span>';
    });
    body += '</div></div>';

    // P tokens
    body += '<div class="ev-word-area"><span class="ev-label ev-label-p">Passage:</span><div class="ev-tokens">';
    pTokens.forEach((tok, i) => {
      let cls = 'ev-tok';
      let badge = '';
      const connIdx = state.evConnections.findIndex(c => c.pIdxs.includes(i));
      if (connIdx >= 0) { cls += ' matched-p'; badge = '<span class="ev-conn-badge ev-conn-badge-p">' + (connIdx + 1) + '</span>'; }
      else if (state.evTempP.includes(i)) { cls += ' sel-p'; }
      const action = !isQPhase ? 'data-action="ev-tap-p" data-idx="' + i + '"' : '';
      body += '<span class="' + cls + '" ' + action + '>' + escapeHTML(tok.word) + badge + '</span>';
    });
    body += '</div></div>';

    // Show completed connections
    if (state.evConnections.length > 0) {
      body += '<div class="ev-connections-list">';
      state.evConnections.forEach((conn, ci) => {
        const qPhrase = conn.qIdxs.map(i => qTokens[i].word).join(' ');
        const pPhrase = conn.pIdxs.map(i => pTokens[i].word).join(' ');
        body += '<span class="ev-conn-item"><span class="conn-q">' + escapeHTML(qPhrase) + '</span><span class="conn-arrow">\u2192</span><span class="conn-p">' + escapeHTML(pPhrase) + '</span><span class="ev-conn-remove" data-action="ev-remove-conn" data-ci="' + ci + '">\u2715</span></span>';
      });
      body += '</div>';
    }

    // Buttons
    body += '<div class="btn-row" style="margin-top:0.75rem;">';
    if (isQPhase) {
      const qDisabled = state.evTempQ.length === 0;
      body += '<button class="btn btn-primary" data-action="ev-to-passage"' + (qDisabled ? ' disabled' : '') + ' style="font-size:0.9rem;' + (qDisabled ? 'opacity:0.4;pointer-events:none;' : '') + '">Match in passage &rarr;</button>';
    } else {
      body += '<button class="btn btn-outline" data-action="ev-back-to-q" style="font-size:0.82rem;flex:none;min-width:auto;">&larr; Back</button>';
      const pDisabled = state.evTempP.length === 0;
      body += '<button class="btn btn-primary" data-action="ev-link"' + (pDisabled ? ' disabled' : '') + ' style="font-size:0.9rem;' + (pDisabled ? 'opacity:0.4;pointer-events:none;' : '') + '">Link &#10003;</button>';
    }
    body += '</div>';

    if (state.evConnections.length > 0) {
      body += '<div class="btn-row" style="margin-top:0.3rem;"><button class="btn btn-correct" data-action="ev-submit" style="font-size:1rem;">Submit ' + state.evConnections.length + ' connection' + (state.evConnections.length > 1 ? 's' : '') + '</button></div>';
    }
  }

  return body + '</div>';
}

function validateEvConnections(pair, qTokens, pTokens) {
  // Parse td entries into q/p phrases
  const tdParsed = pair.td.map(td => parseTdEntry(td)).filter(Boolean);
  const tokenResults = { qHit: {}, pHit: {}, qMiss: {}, pMiss: {} };
  let matchedCount = 0;

  // For each td entry, check if any user connection overlaps significantly
  const usedConnections = new Set();
  tdParsed.forEach((td, tdIdx) => {
    const tdQWords = td.q.split(/\s+/).filter(w => w.length > 1);
    const tdPWords = td.p.split(/\s+/).filter(w => w.length > 1);

    let bestConn = -1;
    let bestScore = 0;

    state.evConnections.forEach((conn, ci) => {
      if (usedConnections.has(ci)) return;
      const userQWords = conn.qIdxs.map(i => qTokens[i].word.toLowerCase().replace(/[^\w]/g, ''));
      const userPWords = conn.pIdxs.map(i => pTokens[i].word.toLowerCase().replace(/[^\w]/g, ''));

      const qHits = tdQWords.filter(w => userQWords.some(uw => uw.includes(w) || w.includes(uw))).length;
      const pHits = tdPWords.filter(w => userPWords.some(uw => uw.includes(w) || w.includes(uw))).length;
      const score = qHits + pHits;
      if (score > bestScore) { bestScore = score; bestConn = ci; }
    });

    if (bestConn >= 0 && bestScore >= 1) {
      matchedCount++;
      usedConnections.add(bestConn);
      const conn = state.evConnections[bestConn];
      conn.qIdxs.forEach(i => { tokenResults.qHit[i] = tdIdx; });
      conn.pIdxs.forEach(i => { tokenResults.pHit[i] = tdIdx; });
    } else {
      // Mark missed — find the td words in the tokens
      qTokens.forEach((tok, i) => {
        const w = tok.word.toLowerCase().replace(/[^\w]/g, '');
        if (w.length > 1 && tdQWords.some(tw => w.includes(tw) || tw.includes(w))) {
          tokenResults.qMiss[i] = tdIdx;
        }
      });
      pTokens.forEach((tok, i) => {
        const w = tok.word.toLowerCase().replace(/[^\w]/g, '');
        if (w.length > 1 && tdPWords.some(tw => w.includes(tw) || tw.includes(w))) {
          tokenResults.pMiss[i] = tdIdx;
        }
      });
    }
  });

  return { matchedCount, total: tdParsed.length, tokenResults };
}

/* ============================================================
   SCANNING MODE (6b)
   Show Q + multiple passage sentences from same passage.
   Student picks which sentence answers the question.
   ============================================================ */
function getPassageKey(pairId) {
  const m = pairId.match(/^(B\d+-T\d+P\d+)/);
  return m ? m[1] : null;
}

function prepareScanItem() {
  if (!state.pairs.length) return;
  const pair = state.pairs[state.currentIndex];
  const pKey = getPassageKey(pair.id);
  
  // Get all same-passage pairs as distractor pool
  const samePassage = ALL_PAIRS.filter(p => p.id !== pair.id && getPassageKey(p.id) === pKey);
  
  // Pick 3-5 distractors (unique passage sentences)
  const seen = new Set([pair.p.toLowerCase().trim()]);
  const distractors = [];
  // Shuffle same-passage pairs for variety
  const shuffled = [...samePassage];
  for (let i = shuffled.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]]; }
  
  for (const sp of shuffled) {
    const key = sp.p.toLowerCase().trim();
    if (!seen.has(key) && distractors.length < 4) {
      seen.add(key);
      distractors.push(sp.p);
    }
  }
  
  // If not enough distractors from same passage, pad with nearby passages
  if (distractors.length < 3) {
    const bookPairs = ALL_PAIRS.filter(p => p.book === pair.book && getPassageKey(p.id) !== pKey);
    for (const bp of bookPairs) {
      const key = bp.p.toLowerCase().trim();
      if (!seen.has(key) && distractors.length < 4) {
        seen.add(key);
        distractors.push(bp.p);
      }
    }
  }
  
  // Build sentence array: correct + distractors, shuffled
  const sentences = distractors.map(d => ({ text: d, isCorrect: false }));
  sentences.push({ text: pair.p, isCorrect: true });
  for (let i = sentences.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [sentences[i], sentences[j]] = [sentences[j], sentences[i]]; }
  
  state.scanSentences = sentences;
  state.scanCorrectIdx = sentences.findIndex(s => s.isCorrect);
  state.scanPicked = -1;
  state.scanSubmitted = false;
}

function renderScanning() {
  if (!state.pairs.length) return '<div class="card"><p>No pairs match this filter. Try changing the book or trick filter.</p></div>';
  const pair = state.pairs[state.currentIndex];
  
  let body = '<div class="card">' + buildCardHeader(pair.id, pair.book, state.currentIndex, state.pairs.length, pair.qt);
  
  // Show the question prominently
  body += buildPhraseBlock('q', 'Question says:', pair.q);
  
  body += '<div class="scan-instruction"><strong>Find the sentence</strong> in the passage that answers this question.</div>';
  
  // Show passage sentences
  state.scanSentences.forEach((s, i) => {
    let cls = 'scan-sentence';
    let check = '';
    if (state.scanSubmitted) {
      cls += ' disabled';
      if (s.isCorrect) {
        cls += state.scanPicked === i ? ' correct' : ' missed';
        check = '<span class="scan-check">' + (state.scanPicked === i ? '✓' : '←') + '</span>';
      } else if (state.scanPicked === i) {
        cls += ' wrong';
        check = '<span class="scan-check">✗</span>';
      }
    } else {
      if (state.scanPicked === i) cls += ' picked';
    }
    body += '<div class="' + cls + '" data-action="scan-pick" data-si="' + i + '"><span class="scan-num">' + String.fromCharCode(65 + i) + '.</span>' + escapeHTML(s.text) + check + '</div>';
  });
  
  if (state.scanSubmitted) {
    const isCorrect = state.scanPicked === state.scanCorrectIdx;
    let fb = isCorrect
      ? '<strong style="color:var(--correct);">✓ Correct!</strong> You found the right sentence.'
      : '<strong style="color:var(--wrong);">✗ Not quite.</strong> The correct sentence is highlighted with a dashed border.';
    
    // Show the paraphrase breakdown
    fb += '<br><br>' + buildAnswerKey(pair.a);
    fb += '<div style="margin-top:0.5rem;">' + pair.t.map(t => buildBadge(t)).join(' ') + '</div>';
    fb += pair.td.map(td => buildTrickExplanation(td)).join('');
    
    body += '<div class="feedback ' + (isCorrect ? 'feedback-correct' : 'feedback-wrong') + '">' + fb + '</div>';
    body += '<div class="btn-row"><button class="btn btn-primary" data-action="next-scan">Next &rarr;</button></div>';
  } else {
    body += '<div class="btn-row"><button class="btn btn-primary" data-action="submit-scan"' + (state.scanPicked < 0 ? ' disabled style="opacity:0.4;pointer-events:none;"' : '') + '>Check</button></div>';
  }
  
  return body + '</div>';
}

function renderSpeed() {
  if (!state.pairs.length) return '<div class="card"><p>No pairs match this filter.</p></div>';
  if (state.speedDone === undefined) return '<div class="card score-card"><h2 style="font-family:DM Serif Display,serif;margin-bottom:0.5rem;">&#9889; Speed Round</h2><p style="color:var(--text-dim);font-size:0.88rem;">10 questions. 15 seconds each.<br>Identify the trick as fast as you can.</p><div class="btn-row" style="justify-content:center;margin-top:1.5rem;"><button class="btn btn-primary" data-action="start-speed" style="font-size:1rem;padding:0.75rem 2rem;">START</button></div></div>';
  if (state.speedDone >= 10) {
    const pct = Math.round(100 * state.speedCorrect / 10);
    const clr = pct >= 70 ? 'var(--correct)' : pct >= 50 ? 'var(--t3)' : 'var(--wrong)';
    return '<div class="card score-card"><div class="score-big" style="color:' + clr + ';">' + pct + '%</div><div class="score-label">Speed Round Complete &mdash; ' + state.speedCorrect + '/10 correct</div><div class="btn-row" style="justify-content:center;margin-top:1.5rem;"><button class="btn btn-primary" data-action="start-speed">New Round</button><button class="btn btn-outline" data-action="mode" data-mode="welcome">Home</button></div></div>';
  }
  const pair = state.pairs[state.currentIndex]; const pct = (state.timeLeft / 150) * 100;
  let body = '<div class="card"><div class="timer-bar" role="progressbar" aria-valuemin="0" aria-valuemax="15" aria-valuenow="' + Math.ceil(state.timeLeft / 10) + '"><div class="timer-fill' + (pct < 30 ? ' danger' : '') + '" style="width:' + pct + '%"></div></div>' +
    '<div class="card-header"><span class="card-id">SPEED ' + (state.speedDone + 1) + '/10 &middot; Book ' + escapeHTML(pair.book) + (pair.qt && QT_NAMES[pair.qt] ? '<span class="qt-badge">' + escapeHTML(QT_NAMES[pair.qt]) + '</span>' : '') + '</span><span class="card-progress" id="speedTimer" style="font-size:0.85rem;color:var(--t3);">' + Math.ceil(state.timeLeft / 10) + 's</span></div>' +
    buildPhraseBlock('q', 'Q:', pair.q) + buildPhraseBlock('p', 'P:', pair.p);
  if (state.answered) {
    const correct = pair.t.includes(state.lastAnswer);
    body += '<div class="feedback ' + (correct ? 'feedback-correct' : 'feedback-wrong') + '">' + (correct ? '&#10003;' : '&#10007;') + ' ' + buildBadge(pair.t[0]) + '</div>';
  } else {
    body += '<div class="trick-grid-3">';
    for (const [key, trick] of Object.entries(TRICKS)) {
      body += '<button class="btn-trick" style="border-color:' + trick.color + ';padding:0.4rem;" data-action="speed" data-trick="' + key + '"' + (state.locked ? ' disabled' : '') + '><span style="color:' + trick.color + ';font-size:0.8rem;">' + escapeHTML(trick.name) + '</span></button>';
    }
    body += '</div>';
  }
  return body + '</div>';
}

/* ============================================================
   EVENT DELEGATION
   ============================================================ */
document.addEventListener('click', function(e) {
  const target = e.target.closest('[data-action]');
  if (!target) return;
  const action = target.dataset.action;

  if (action === 'login-submit') {
    const day = (document.getElementById('loginDay').value || '').padStart(2, '0');
    const month = (document.getElementById('loginMonth').value || '').padStart(2, '0');
    const year = document.getElementById('loginYear').value || '';
    const name = (document.getElementById('loginName').value || '').trim();
    if (!day || !month || !year || !name || day === '00' || month === '00') { alert('Please fill in all fields.'); return; }
    loginUser(day + '_' + month + '_' + year + '_' + name);
  }
  else if (action === 'login-return') loginUser(target.dataset.uid);
  else if (action === 'logout') { state.screen = 'login'; state.userId = null; state.userData = null; state.sessionStreak = 0; document.getElementById('toolbar').style.display = 'none'; document.getElementById('masteryBar').style.display = 'none'; render(); }
  else if (action === 'mode') switchMode(target.dataset.mode);
  else if (action === 'filter') setFilter(target.dataset.t);
  else if (action === 'next') nextPair();
  else if (action === 'rec-yes') answerRecognise(true);
  else if (action === 'rec-no') answerRecognise(false);
  else if (action === 'submit-evidence') submitEvidence();
  else if (action === 'skip-evidence') { state.evidenceText = ''; state.evidenceStep = false; state.locked = true; state.answered = true; recordCorrect(state.pairs[state.currentIndex].t); render(); updateMasteryBar(); }
  else if (action === 'classify') answerClassify(target.dataset.trick);
  else if (action === 'speed') answerSpeed(target.dataset.trick);
  else if (action === 'start-speed') startSpeedRound();
  else if (action === 'ng-real') answerNotGiven(false);
  else if (action === 'ng-notgiven') answerNotGiven(true);
  else if (action === 'advance-ng') { state.ngIndex++; state.answered = false; state.locked = false; render(); }
  else if (action === 'restart-ng') { state.ngItems = null; state.ngIndex = 0; state.answered = false; state.locked = false; render(); }
  else if (action === 'ev-tap-q') { const idx = parseInt(target.dataset.idx); const pos = state.evTempQ.indexOf(idx); if (pos >= 0) state.evTempQ.splice(pos, 1); else state.evTempQ.push(idx); render(); }
  else if (action === 'ev-tap-p') { const idx = parseInt(target.dataset.idx); const pos = state.evTempP.indexOf(idx); if (pos >= 0) state.evTempP.splice(pos, 1); else state.evTempP.push(idx); render(); }
  else if (action === 'ev-to-passage') { if (state.evTempQ.length > 0) { state.evSelectingQ = false; render(); } }
  else if (action === 'ev-back-to-q') { state.evSelectingQ = true; state.evTempP = []; render(); }
  else if (action === 'ev-link') { if (state.evTempQ.length > 0 && state.evTempP.length > 0) { state.evConnections.push({ qIdxs: [...state.evTempQ], pIdxs: [...state.evTempP] }); state.evTempQ = []; state.evTempP = []; state.evSelectingQ = true; render(); } }
  else if (action === 'ev-remove-conn') { const ci = parseInt(target.dataset.ci); state.evConnections.splice(ci, 1); render(); }
  else if (action === 'ev-submit') { state.evSubmitted = true; const pair = state.pairs[state.currentIndex]; recordCorrect(pair.t); render(); updateMasteryBar(); }
  else if (action === 'next-evidence') { state.currentIndex++; if (state.currentIndex >= state.pairs.length) { state.currentIndex = 0; if (state.shuffleOn) shuffleArray(state.pairs); } state.evConnections = []; state.evTempQ = []; state.evTempP = []; state.evSelectingQ = true; state.evSubmitted = false; render(); }
  else if (action === 'scan-pick') { if (!state.scanSubmitted) { state.scanPicked = parseInt(target.dataset.si); render(); } }
  else if (action === 'submit-scan') { if (state.scanPicked >= 0 && !state.scanSubmitted) { state.scanSubmitted = true; const pair = state.pairs[state.currentIndex]; const isCorrect = state.scanPicked === state.scanCorrectIdx; if (isCorrect) recordCorrect(pair.t); else recordWrong(pair.t); render(); updateMasteryBar(); } }
  else if (action === 'next-scan') { state.currentIndex = pickNextPair(); prepareScanItem(); render(); }
});

document.getElementById('bookSelect').addEventListener('change', function() { setBook(this.value); });
document.getElementById('qtSelect').addEventListener('change', function() { state.qtFilter = this.value; applyFilters(); if (state.screen === 'notgiven') { state.ngItems = null; state.ngIndex = 0; } render(); });
document.getElementById('shuffleToggle').addEventListener('change', function() { state.shuffleOn = this.checked; applyFilters(); if (state.screen === 'notgiven') { state.ngItems = null; state.ngIndex = 0; } render(); });
document.addEventListener('keydown', function(e) { if (e.key === 'Enter') { const ei = document.getElementById('evidenceInput'); if (ei && document.activeElement === ei) { e.preventDefault(); submitEvidence(); return; } } if (e.key === 'Enter' || e.key === ' ') { const t = e.target.closest('[role="button"]'); if (t) { e.preventDefault(); t.click(); } } });

/* INIT — Load data from external JSON */
(function loadData() {
  const main = document.getElementById('mainContent');
  main.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:60vh;"><div style="text-align:center;"><div style="font-size:2rem;margin-bottom:1rem;">⏳</div><p style="color:var(--text-dim);font-size:0.9rem;">Loading 1,211 paraphrase pairs...</p></div></div>';
  fetch('data.json')
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(data) {
      ALL_PAIRS = data.pairs;
      ALL_NG = data.ng;
      DATA_LOADED = true;
      render();
    })
    .catch(function(err) {
      main.innerHTML = '<div style="padding:2rem;text-align:center;"><p style="color:var(--wrong);font-size:1rem;margin-bottom:1rem;">⚠️ Could not load training data.</p><p style="color:var(--text-dim);font-size:0.85rem;">Check your internet connection and try again.</p><button onclick="location.reload()" style="margin-top:1rem;padding:0.5rem 1.5rem;background:var(--t3);color:#000;border:none;border-radius:8px;font-weight:600;cursor:pointer;">Retry</button></div>';
    });
})();
